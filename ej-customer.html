<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EJ TOBACCO OLSHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --safe: #22C55E; --blue: #3B82F6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top, rgba(212,175,55,0.1), transparent 40%), #07090d; color: white; padding-bottom: 90px; }
        
        .header { text-align: center; padding: 15px; position: sticky; top: 0; background: rgba(7,9,13,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .view-section { display: none; padding: 15px; } .view-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

        /* Style Katalog */
        .grid-katalog { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card-produk { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 15px; text-align: center; position: relative; }
        .card-produk img { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.5); }
        .btn-add { background: linear-gradient(135deg, #F7E08C, #D4AF37); color: black; border: none; padding: 10px; width: 100%; border-radius: 10px; font-weight: 800; font-size: 11px; margin-top: 10px; cursor: pointer; }

        /* Style Checkout & Cart */
        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-box { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 15px; color: white; font-size: 12px; }
        .input-box:focus { border-color: var(--gold); outline: none; }
        #map { height: 200px; width: 100%; border-radius: 12px; margin-bottom: 15px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(10,12,18,0.95); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; padding: 10px 15px 20px; z-index: 1000; }
        .nav-item { color: gray; font-size: 10px; font-weight: 800; text-align: center; cursor: pointer; display: flex; flex-direction: column; gap: 5px; flex: 1; }
        .nav-item i { font-size: 20px; } .nav-item.active { color: var(--gold); }
        .badge-cart { position: absolute; top: -5px; right: 25px; background: var(--danger); color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="color:var(--gold); font-size: 18px; font-weight:800;"><i class="fa-solid fa-crown"></i> EJ TOBACCO</h1>
    </div>

    <div id="view-katalog" class="view-section active">
        <div style="margin-bottom:20px; font-size:14px; font-weight:800;">Produk Pilihan</div>
        <div class="grid-katalog" id="katalogOnline">
            <div style="text-align:center; color:gray; grid-column: span 2;">Memuat produk...</div>
        </div>
    </div>

    <div id="view-cart" class="view-section">
        <div class="glass-card" id="cartSummary">
            <h2 style="font-size:12px; color:var(--gold); margin-bottom:10px;"><i class="fa-solid fa-cart-shopping"></i> Item Belanja</h2>
            <div id="cartItemsHtml" style="font-size:12px; color:#ccc; border-bottom:1px dashed rgba(255,255,255,0.2); padding-bottom:10px; margin-bottom:10px;">Belum ada barang.</div>
            <div style="display:flex; justify-content:space-between; font-weight:800;"><span>Subtotal:</span><span id="subTotApp" style="color:white;">Rp 0</span></div>
        </div>

        <div class="glass-card">
            <h2 style="font-size:12px; color:var(--gold); margin-bottom:10px;"><i class="fa-solid fa-location-dot"></i> Pengiriman</h2>
            <div class="input-group"><input type="text" id="custName" class="input-box" placeholder="Nama Lengkap"></div>
            <div class="input-group"><input type="number" id="custWA" class="input-box" placeholder="Nomor WhatsApp"></div>
            
            <div id="map"></div>
            <div style="text-align:center; font-size:10px; color:var(--gold); margin-bottom:10px;" id="distInfo">Tap peta untuk titik akurat</div>
            <textarea id="custAddress" class="input-box" placeholder="Detail Alamat (Jalan, RT/RW)"></textarea>
            
            <div id="ongkirLabel" style="margin-top:15px; font-size:12px; display:flex; justify-content:space-between; color:gray;">
                <span>Ongkir (Radius)</span><strong id="valOngkir" style="color:white;">Rp 0</strong>
            </div>
        </div>

        <button class="btn-add" onclick="prosesCheckoutApp()" style="padding:15px; font-size:14px;">BUAT PESANAN</button>
    </div>

    <div id="view-pesanan" class="view-section">
        <div style="margin-bottom:20px; font-size:14px; font-weight:800;"><i class="fa-solid fa-boxes-stacked"></i> Pesanan Aktif</div>
        <div id="orderList"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchNav('katalog', this)"><i class="fa-solid fa-shop"></i> Beranda</div>
        <div class="nav-item" style="position:relative;" onclick="switchNav('cart', this)">
            <i class="fa-solid fa-cart-shopping"></i> Keranjang <span class="badge-cart" id="cartCount">0</span>
        </div>
        <div class="nav-item" onclick="switchNav('pesanan', this)"><i class="fa-solid fa-clipboard-list"></i> Pesanan</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCP6q75dxdWmsvXlAU-ON0KyvzqGXeCaUg", authDomain: "ejtobacco-v2.firebaseapp.com", databaseURL: "https://ejtobacco-v2-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "ejtobacco-v2" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let myCart = []; let subtotalOnline = 0;
        const STORE_LAT = -6.8694; const STORE_LNG = 109.0435; const MAX_RADIUS = 10;
        let finalJarak = 0; let finalOngkir = 0; let finalLat = 0; let finalLng = 0;

        // Muat Katalog dari Firebase
        db.ref('produk').on('value', snap => {
            let html = '';
            snap.forEach(c => {
                let p = c.val(); p.id = c.key;
                // Asumsi olshop melayani dari stok PUSAT
                let stokPusat = p.stok ? (p.stok['pusat'] || 0) : 0;
                let btn = stokPusat > 0 
                    ? `<button class="btn-add" onclick="addToCart('${p.id}', '${p.nama}', ${p.harga})">+ KERANJANG</button>` 
                    : `<button class="btn-add" style="background:gray; color:white;" disabled>HABIS</button>`;
                
                html += `
                <div class="card-produk">
                    <div style="font-size:11px; font-weight:800; margin-bottom:5px;">${p.nama}</div>
                    <div style="color:var(--gold); font-size:12px; font-weight:800;">Rp ${p.harga.toLocaleString('id-ID')}</div>
                    ${btn}
                </div>`;
            });
            document.getElementById('katalogOnline').innerHTML = html || 'Katalog kosong.';
        });

        function addToCart(id, nama, harga) {
            myCart.push({id, nama, harga});
            document.getElementById('cartCount').innerText = myCart.length;
            subtotalOnline = myCart.reduce((sum, item) => sum + item.harga, 0);
            
            let htmlItems = myCart.map(i => `<div style="display:flex; justify-content:space-between;"><span>${i.nama}</span><b>Rp ${i.harga.toLocaleString()}</b></div>`).join('');
            document.getElementById('cartItemsHtml').innerHTML = htmlItems;
            document.getElementById('subTotApp').innerText = 'Rp ' + subtotalOnline.toLocaleString();
            alert("Berhasil masuk keranjang!");
        }

        // Setup Map Radius di Tab Cart
        const map = L.map('map').setView([STORE_LAT, STORE_LNG], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([STORE_LAT, STORE_LNG], {draggable: true}).addTo(map);

        marker.on('dragend', function (e) { hitungOngkirApp(marker.getLatLng()); });
        map.on('click', function (e) { marker.setLatLng(e.latlng); hitungOngkirApp(e.latlng); });

        function hitungOngkirApp(latlng) {
            finalLat = latlng.lat; finalLng = latlng.lng;
            const R = 6371; const dLat = (finalLat-STORE_LAT)*Math.PI/180; const dLon = (finalLng-STORE_LNG)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(STORE_LAT*Math.PI/180)*Math.cos(finalLat*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            finalJarak = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            
            finalOngkir = finalJarak <= MAX_RADIUS ? 5000 : 15000;
            document.getElementById('distInfo').innerText = `Jarak: ${finalJarak.toFixed(1)} KM`;
            document.getElementById('valOngkir').innerText = `Rp ${finalOngkir.toLocaleString()} (${finalJarak<=MAX_RADIUS?'Kurir EJ':'Ekspedisi'})`;
        }

        function prosesCheckoutApp() {
            if(myCart.length === 0) return alert("Keranjang kosong!");
            const nama = document.getElementById('custName').value;
            const wa = document.getElementById('custWA').value;
            const alamat = document.getElementById('custAddress').value;
            if(!nama || !wa || !alamat) return alert("Lengkapi data pengiriman!");

            const resi = "EJ" + new Date().getTime().toString().slice(-6);
            
            db.ref('pesanan').push({
                noPesanan: resi, namaPembeli: nama, nohp: wa,
                alamat: `${alamat} \n(Jarak: ${finalJarak.toFixed(1)}KM)`,
                mapLink: `https://www.google.com/maps?q=$${finalLat},${finalLng}`,
                total: subtotalOnline + finalOngkir, metode: 'COD', urgent: false,
                status: 'Menunggu', items: myCart, // Mengirim data keranjang ke Admin
                tanggal: new Date().toLocaleDateString('id-ID'), waktu: new Date().toLocaleTimeString('id-ID')
            }).then(() => {
                let saved = JSON.parse(localStorage.getItem('ej_orders')) || [];
                saved.push(resi); localStorage.setItem('ej_orders', JSON.stringify(saved));
                
                alert("Pesanan dikirim ke Admin!");
                myCart = []; document.getElementById('cartCount').innerText = "0";
                document.getElementById('cartItemsHtml').innerHTML = "Belum ada barang.";
                switchNav('pesanan', document.querySelectorAll('.nav-item')[2]);
            });
        }

        // Tampilkan Pesanan Saya (Baca dari LocalStorage)
        function muatPesanan() {
            let saved = JSON.parse(localStorage.getItem('ej_orders')) || [];
            db.ref('pesanan').on('value', snap => {
                let html = '';
                snap.forEach(c => {
                    let o = c.val();
                    if(saved.includes(o.noPesanan)) {
                        html += `<div class="glass-card" style="padding:15px; font-size:12px;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                                <b>${o.noPesanan}</b> <span style="color:var(--gold);">${o.status.toUpperCase()}</span>
                            </div>
                            <div style="color:gray;">Total Bayar: <b style="color:white;">Rp ${o.total.toLocaleString()}</b></div>
                        </div>`;
                    }
                });
                document.getElementById('orderList').innerHTML = html || '<div style="color:gray;">Belum ada pesanan.</div>';
            });
        }

        function switchNav(view, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            el.classList.add('active');
            if(view === 'cart') setTimeout(() => map.invalidateSize(), 100);
            if(view === 'pesanan') muatPesanan();
        }
    </script>
</body>
</html>
