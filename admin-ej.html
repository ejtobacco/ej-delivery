<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ ADMIN PRO - 80MM</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="icon" href="logo-baru.png" type="image/png">
    <link rel="apple-touch-icon" href="logo-baru.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2); --text-main: #FFFFFF; --safe: #22C55E; --danger: #EF4444; --blue: #2563eb; --wa: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 15px; padding-bottom: 50px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo-text-container { display: flex; flex-direction: column; gap: 2px; }
        .main-logo-text { color: var(--gold); font-weight: 800; font-size: 20px; letter-spacing: 1px; text-transform: uppercase; }
        .sub-logo-text { color: var(--text-main); font-weight: 400; font-size: 11px; opacity: 0.8; letter-spacing: 2px; text-transform: uppercase; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .report-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; }
        .report-box.active { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); }
        .report-box b { display: block; font-size: 14px; margin-top: 4px; }
        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        input, textarea, select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px; outline: none; }
        .btn-main { background: linear-gradient(135deg, #F7E08C, #D4AF37); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        .order-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0; }
        #receipt-print { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text-container">
            <div class="main-logo-text">EJ TOBACCO</div>
            <div class="sub-logo-text">DELIVERY</div>
        </div>
        <div id="runningClock" style="font-size: 14px; font-weight: 800; color: var(--safe);">00:00:00</div>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 15px;">
        <input type="date" id="datePicker" onchange="changeDate()" style="border-color: var(--gold); background: rgba(212, 175, 55, 0.1); color: var(--gold); text-align: center; font-weight: 800; flex: 1;">
        <button onclick="goToToday()" style="background: var(--gold); border: none; border-radius: 12px; padding: 0 15px; font-weight: 800; font-size: 10px; color: black;">HARI INI</button>
    </div>

    <div class="report-grid">
        <div class="report-box active" id="f-Semua" onclick="setFilter('Semua')"><span>Sisa</span><b id="countProses">0</b></div>
        <div class="report-box" id="f-Terkirim" onclick="setFilter('Terkirim')" style="border-color: var(--safe);"><span>Sukses</span><b id="countSukses">0</b></div>
        <div class="report-box" id="f-Gagal" onclick="setFilter('Gagal')" style="border-color: var(--danger);"><span>Cancel</span><b id="countGagal">0</b></div>
    </div>

    <div class="report-box" style="margin-bottom: 20px; border-color: var(--safe); background: rgba(34, 197, 94, 0.05); cursor: default;">
        <span style="color: var(--safe); font-size: 10px; font-weight: 800;">TOTAL SALDO DI KURIR</span>
        <b id="dailyTunai" style="font-size: 20px; color: var(--safe);">Rp0</b>
    </div>

    <div class="glass-card">
        <input type="text" id="noPesanan" placeholder="No Pesanan (#001)">
        <input type="text" id="pembeli" placeholder="Nama Pembeli">
        <input type="text" id="nohp" placeholder="WhatsApp (08xx)">
        <textarea id="alamat" placeholder="Alamat Lengkap"></textarea>
        <input type="text" id="mapLink" placeholder="Link Google Maps">
        <select id="metodeBayar" onchange="toggleTotal()"><option value="COD">Metode: COD</option><option value="Transfer">Metode: Transfer</option></select>
        <input type="number" id="total" placeholder="Harga COD (Rp)">
        <button class="btn-main" onclick="tambah()">SIMPAN, PRINT & WA</button>
    </div>

    <div class="glass-card">
        <input type="number" id="jumlahSetoran" placeholder="Input Setoran (Rp)">
        <button class="btn-main" style="background:var(--safe); color:white" onclick="setor()">TERIMA SETORAN</button>
    </div>

    <input type="text" id="searchBar" placeholder="🔍 Cari..." oninput="renderList()" style="width:100%; padding:12px; border-radius:12px; background:var(--glass); border:1px solid var(--gold); color:white; margin-bottom:15px; outline:none;">
    <div id="adminList" class="glass-card">Memuat...</div>

    <div id="receipt-print"><div id="receipt-content"></div></div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVQGysGRlYJ2b4PekM3vaXKtx6UFvNlCk", databaseURL: "https://ej-tobacco-express-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let allOrders = [], totalSetoranGlobal = 0, currentFilter = "Semua", lastOrder = null, lastDateString = "";

        function formatTglDB(date) { const d = new Date(date); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
        function initDate() { const n = new Date(); document.getElementById('datePicker').value = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; lastDateString = formatTglDB(n); }
        initDate();

        function changeDate() { updateAll(); }
        function goToToday() { initDate(); updateAll(); }
        function setFilter(f) { currentFilter = f; document.querySelectorAll('.report-box').forEach(el => el.classList.remove('active')); document.getElementById('f-'+f).classList.add('active'); updateAll(); }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('runningClock').innerText = now.toLocaleTimeString('id-ID');
                if (formatTglDB(now) !== lastDateString) { lastDateString = formatTglDB(now); initDate(); updateAll(); }
            }, 1000);
        }

        db.ref('pesanan').on('value', snap => {
            const val = snap.val();
            allOrders = val ? Object.keys(val).map(k => ({id:k, ...val[k]})).reverse() : [];
            db.ref('setoran').on('value', sSnap => {
                totalSetoranGlobal = Object.values(sSnap.val() || {}).reduce((a, b) => a + b, 0);
                updateAll();
            });
        });

        function updateAll() {
            const p = document.getElementById('datePicker').value.split('-');
            const tgl = `${p[2]}/${p[1]}/${p[0]}`;
            updateDashboard(tgl);
            renderList(tgl);
        }

        function updateDashboard(tgl) {
            let s=0, g=0, p=0, cod=0;
            allOrders.forEach(o => {
                if (o.tanggal === tgl) { if (o.status === 'Terkirim') s++; else if (o.status === 'Gagal') g++; }
                if (o.status !== 'Terkirim' && o.status !== 'Gagal') p++;
                if (o.status === 'Terkirim' && o.metode === 'COD') cod += Number(o.total || 0);
            });
            document.getElementById('countSukses').innerText = s;
            document.getElementById('countGagal').innerText = g;
            document.getElementById('countProses').innerText = p;
            document.getElementById('dailyTunai').innerText = "Rp" + (cod - totalSetoranGlobal).toLocaleString();
        }

        function renderList(tgl) {
            const key = document.getElementById('searchBar').value.toLowerCase();
            let html = "";
            const filtered = allOrders.filter(o => {
                const mS = (o.namaPembeli || "").toLowerCase().includes(key) || (o.noPesanan || "").toLowerCase().includes(key);
                const mSt = (currentFilter === "Semua") ? (o.status !== 'Terkirim' && o.status !== 'Gagal') : (o.status === currentFilter && o.tanggal === tgl);
                return mS && mSt;
            });
            if(filtered.length === 0) html = `<p style="text-align:center; opacity:0.5; padding:20px;">Kosong.</p>`;
            else filtered.forEach(o => {
                const wa = String(o.nohp || "").replace(/\D/g, '').replace(/^0/, '62');
                html += `<div class="order-item">
                    <span style="font-size:9px; color:var(--gold)">${o.tanggal} | ${o.waktu}</span><br>
                    <b>${o.noPesanan} - ${o.namaPembeli}</b><br>
                    <small>${o.status} | Rp${Number(o.total).toLocaleString()}</small>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:8px;">
                        <a href="https://wa.me/${wa}" style="background:var(--wa); text-decoration:none; color:white; padding:8px; border-radius:8px; text-align:center; font-size:10px; font-weight:800;">WA</a>
                        <button style="background:var(--gold); color:black; border:none; padding:8px; border-radius:8px; font-size:10px; font-weight:800;" onclick="reprint('${o.id}')">PRINT</button>
                    </div>
                </div>`;
            });
            document.getElementById('adminList').innerHTML = html;
        }

        function toggleTotal() { document.getElementById('total').style.display = document.getElementById('metodeBayar').value === 'Transfer' ? 'none' : 'block'; }

        // FUNGSI UTAMA: SIMPAN, PRINT, & WHATSAPP
        function tambah() {
            const n = new Date();
            const nohpAsli = document.getElementById('nohp').value;
            const d = { 
                noPesanan: document.getElementById('noPesanan').value || "#"+Date.now().toString().slice(-4), 
                namaPembeli: document.getElementById('pembeli').value, 
                nohp: nohpAsli, 
                alamat: document.getElementById('alamat').value, 
                mapLink: document.getElementById('mapLink').value, 
                total: document.getElementById('total').value || 0, 
                metode: document.getElementById('metodeBayar').value, 
                status: 'Menunggu', 
                tanggal: formatTglDB(n), 
                waktu: n.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) 
            };

            if(!d.namaPembeli || !d.nohp) return alert("Nama & WA wajib diisi!");

            db.ref('pesanan').push(d).then(() => { 
                lastOrder = d; 
                
                // 1. Jalankan Cetak Bluetooth
                executePrint(); 

                // 2. Jalankan Kirim WA
                const waNumber = String(nohpAsli).replace(/\D/g, '').replace(/^0/, '62');
                const linkMaps = d.mapLink ? `\n📍 Map: ${d.mapLink}` : "";
                const teksWA = 
                    `*EJ TOBACCO DELIVERY* 📦\n` +
                    `------------------------------------------\n` +
                    `Halo Kak *${d.namaPembeli.toUpperCase()}* 👋\n\n` +
                    `Pesanan Anda sedang diproses kurir.\n\n` +
                    `*RINCIAN:* \n` +
                    `🆔 Resi: ${d.noPesanan}\n` +
                    `💰 Total: *Rp${Number(d.total).toLocaleString()}*\n` +
                    `💳 Bayar: *${d.metode}*\n` +
                    `📍 Tujuan: ${d.alamat}${linkMaps}\n\n` +
                    `Mohon siapkan uang pas ya. Terima kasih! 🙏`;

                const urlWA = `https://wa.me/${waNumber}?text=${encodeURIComponent(teksWA)}`;
                
                // Buka WA setelah jeda sebentar agar printer punya waktu memproses
                setTimeout(() => { window.open(urlWA, '_blank'); }, 1000);

                document.querySelectorAll('input, textarea').forEach(i => i.value = ""); 
            });
        }

        function executePrint() {
            if(!lastOrder) return;
            const cleanNo = (lastOrder.noPesanan || "").replace(/[^a-zA-Z0-9]/g, "");
            const teks80mm = 
                `[C]<font size="big"><b>EJ TOBACCO DELIVERY</b></font>\n` +
                `[C]"Kualitas Premium, Kiriman Cepat"\n` +
                `[C]================================================\n` +
                `[C]<font size="big"><b>NO. RESI : ${lastOrder.noPesanan}</b></font>\n` +
                `[C]================================================\n` +
                `[L]<b>PENERIMA:</b>\n` +
                `[L]${lastOrder.namaPembeli}\n` +
                `[L]No. HP : ${lastOrder.nohp}\n\n` +
                `[L]<b>ALAMAT PENGIRIMAN:</b>\n` +
                `[L]${lastOrder.alamat}\n` +
                `[C]================================================\n` +
                `[L]METODE PEMBAYARAN: ${lastOrder.metode}\n` +
                `[L]TOTAL TAGIHAN    : Rp${Number(lastOrder.total).toLocaleString()}\n` +
                `[C]================================================\n` +
                `[C][b]code128,3,80,${cleanNo},yes\n\n` +
                `[C]------------------------------------------------\n` +
                `[C]Tgl: ${lastOrder.tanggal} ${lastOrder.waktu}\n` +
                `[C]Terima kasih atas pesanan Anda!\n\n\n\n\n`;

            window.location.href = "rawbt:" + encodeURI(teks80mm);
        }

        function reprint(id) { lastOrder = allOrders.find(o => o.id === id); if(lastOrder) executePrint(); }
        function setor() { const n = new Date(); const dK = formatTglDB(n).replace(/\//g, '-'); const j = Number(document.getElementById('jumlahSetoran').value); db.ref('setoran/' + dK).transaction(cv => (cv || 0) + j).then(() => { alert("Setoran Diterima!"); document.getElementById('jumlahSetoran').value = ""; }); }
        function hapus(id) { if(confirm("Hapus?")) db.ref('pesanan/' + id).remove(); }
        startClock();
    </script>
</body>
</html>
