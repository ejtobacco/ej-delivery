<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ ADMIN PRO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="icon" href="https://api.iconify.design/material-symbols:admin-panel-settings-rounded.svg?color=%23D4AF37">
    <link rel="apple-touch-icon" href="https://api.iconify.design/material-symbols:admin-panel-settings-rounded.svg?color=%23D4AF37">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2); --text-main: #FFFFFF; --safe: #22C55E; --danger: #EF4444; --blue: #2563eb; --wa: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 15px; padding-bottom: 50px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .report-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .report-box.active { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); }
        .report-box span { font-size: 7px; font-weight: 800; color: var(--gold); text-transform: uppercase; }
        .report-box b { display: block; font-size: 14px; margin-top: 4px; }
        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        input, textarea, select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px; outline: none; }
        .btn-main { background: linear-gradient(135deg, #F7E08C, #D4AF37); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        .order-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0; }
        .btn-small { padding: 10px; border-radius: 8px; font-weight: 800; font-size: 10px; text-align: center; text-decoration: none; color: white; border: none; cursor: pointer; }
        .modal-foto { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .modal-foto img { max-width: 90%; max-height: 70%; border: 2px solid var(--gold); border-radius: 15px; }
        
        /* CETAK RESI */
        #receipt-print { display: none; }
        @media print {
            body * { visibility: hidden; background: none !important; color: #000 !important; }
            #receipt-print, #receipt-print * { visibility: visible !important; display: block !important; color: #000 !important; }
            #receipt-print { position: absolute; left: 0; top: 0; width: 100%; background: #fff !important; font-family: 'Courier New', monospace; padding: 10px; }
            .line { border-bottom: 1px dashed #000; margin: 10px 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h2 style="color: var(--gold)">EJ ADMIN</h2>
            <div id="runningClock" style="font-size: 11px; font-weight: 800; color: var(--safe); margin-top: 2px;">00:00:00</div>
        </div>
        <div style="font-size: 9px; font-weight: 800; background: var(--glass); padding: 5px 10px; border-radius: 8px; text-align: right;">
            SYSTEM ACTIVE<br>
            <span id="currentDay" style="color: var(--gold);">-- --- ----</span>
        </div>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 15px;">
        <input type="date" id="datePicker" onchange="changeDate()" style="border-color: var(--gold); background: rgba(212, 175, 55, 0.1); color: var(--gold); text-align: center; font-weight: 800; flex: 1; cursor: pointer;">
        <button onclick="goToToday()" style="background: var(--gold); border: none; border-radius: 12px; padding: 0 15px; font-weight: 800; font-size: 10px; color: black; cursor: pointer;">HARI INI</button>
    </div>

    <div class="report-grid">
        <div class="report-box active" id="f-Semua" onclick="setFilter('Semua')"><span>Sisa (Total)</span><b id="countProses">0</b></div>
        <div class="report-box" id="f-Terkirim" onclick="setFilter('Terkirim')" style="border-color: var(--safe);"><span>Sukses</span><b id="countSukses">0</b></div>
        <div class="report-box" id="f-Gagal" onclick="setFilter('Gagal')" style="border-color: var(--danger);"><span>Gagal</span><b id="countGagal">0</b></div>
    </div>

    <div class="report-box" style="margin-bottom: 20px; border-color: var(--safe); background: rgba(34, 197, 94, 0.05); cursor: default;">
        <span style="color: var(--safe);">TOTAL SALDO DI KURIR</span>
        <b id="dailyTunai" style="font-size: 20px; color: var(--safe);">Rp0</b>
    </div>

    <div class="glass-card">
        <input type="text" id="noPesanan" placeholder="No Pesanan (#001)">
        <input type="text" id="pembeli" placeholder="Nama Pembeli">
        <input type="text" id="nohp" placeholder="WhatsApp">
        <textarea id="alamat" placeholder="Alamat Lengkap"></textarea>
        <input type="text" id="mapLink" placeholder="Link Map Manual (Opsional)">
        <select id="metodeBayar" onchange="toggleTotal()"><option value="COD">COD</option><option value="Transfer">Transfer</option></select>
        <input type="number" id="total" placeholder="Harga COD (Rp)">
        <button class="btn-main" onclick="tambah()">SIMPAN & CETAK</button>
    </div>

    <div class="glass-card">
        <input type="number" id="jumlahSetoran" placeholder="Input Setoran Masuk (Rp)">
        <button class="btn-main" style="background:var(--safe); color:white" onclick="setor()">TERIMA SETORAN</button>
    </div>

    <input type="text" id="searchBar" placeholder="🔍 Cari nama/no pesanan..." oninput="renderList()" style="width:100%; padding:12px; border-radius:12px; background:var(--glass); border:1px solid var(--gold); color:white; margin-bottom:15px; outline:none;">
    <div id="adminList" class="glass-card">Memuat...</div>

    <div id="modalFoto" class="modal-foto" onclick="this.style.display='none'">
        <img id="imgBukti" src="">
        <p style="color:var(--gold); margin-top:15px; font-weight:800; font-size:12px;">KLIK MANA SAJA UNTUK TUTUP</p>
    </div>

    <div id="receipt-print"><div id="receipt-content"></div></div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVQGysGRlYJ2b4PekM3vaXKtx6UFvNlCk", databaseURL: "https://ej-tobacco-express-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let allOrders = [], totalSetoranGlobal = 0, currentFilter = "Semua", lastOrder = null;
        let lastDateString = new Date().toLocaleDateString('id-ID');

        document.getElementById('datePicker').valueAsDate = new Date();

        function getFormattedDate(date) { return date.toLocaleDateString('id-ID'); }
        function changeDate() { updateAll(); }
        function goToToday() { document.getElementById('datePicker').valueAsDate = new Date(); updateAll(); }
        
        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.report-box').forEach(el => el.classList.remove('active'));
            document.getElementById('f-' + f).classList.add('active');
            renderList();
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                const jam = now.getHours().toString().padStart(2, '0');
                const menit = now.getMinutes().toString().padStart(2, '0');
                const detik = now.getSeconds().toString().padStart(2, '0');
                document.getElementById('runningClock').innerText = `${jam}:${menit}:${detik}`;
                
                const opsi = { day: 'numeric', month: 'short', year: 'numeric' };
                document.getElementById('currentDay').innerText = now.toLocaleDateString('id-ID', opsi).toUpperCase();
                
                const checkToday = getFormattedDate(now);
                if (checkToday !== lastDateString) {
                    lastDateString = checkToday;
                    document.getElementById('datePicker').valueAsDate = now;
                    updateAll();
                }
            }, 1000);
        }

        db.ref('pesanan').on('value', snap => {
            const val = snap.val();
            allOrders = val ? Object.keys(val).map(k => ({id:k, ...val[k]})).reverse() : [];
            
            const hariIni = new Date();
            allOrders.forEach(o => {
                if (o.tanggal) {
                    const parts = o.tanggal.split('/');
                    const tglPesanan = new Date(parts[2], parts[1] - 1, parts[0]);
                    const selisihHari = Math.ceil((hariIni - tglPesanan) / (1000 * 60 * 60 * 24));
                    if (selisihHari > 90) db.ref('pesanan/' + o.id).remove();
                }
            });

            db.ref('setoran').on('value', sSnap => {
                totalSetoranGlobal = Object.values(sSnap.val() || {}).reduce((a, b) => a + b, 0);
                updateAll();
            });
        });

        function updateAll() {
            const pickerVal = document.getElementById('datePicker').value;
            const dateStr = pickerVal ? getFormattedDate(new Date(pickerVal)) : getFormattedDate(new Date());
            updateDashboard(dateStr);
            renderList(dateStr);
        }

        function updateDashboard(dateStr) {
            let s = 0, g = 0, p = 0, totalCodSuksesGlobal = 0;
            allOrders.forEach(o => {
                if (o.tanggal === dateStr) {
                    if (o.status === 'Terkirim') s++;
                    else if (o.status === 'Gagal') g++;
                }
                if (o.status !== 'Terkirim' && o.status !== 'Gagal') p++;
                if (o.status === 'Terkirim' && o.metode === 'COD') totalCodSuksesGlobal += Number(o.total || 0);
            });
            document.getElementById('countSukses').innerText = s;
            document.getElementById('countGagal').innerText = g;
            document.getElementById('countProses').innerText = p;
            const saldoKurir = totalCodSuksesGlobal - totalSetoranGlobal;
            document.getElementById('dailyTunai').innerText = "Rp" + saldoKurir.toLocaleString();
        }

        function renderList(dateStr) {
            const keyword = document.getElementById('searchBar').value.toLowerCase();
            let html = "";
            const filtered = allOrders.filter(o => {
                const matchSearch = (o.namaPembeli || "").toLowerCase().includes(keyword) || (o.noPesanan || "").toLowerCase().includes(keyword);
                let matchStatus = (currentFilter === "Semua") ? (o.status !== 'Terkirim' && o.status !== 'Gagal') : (o.status === currentFilter && o.tanggal === dateStr);
                return matchSearch && matchStatus;
            });

            filtered.forEach(o => {
                const wa = String(o.nohp || "").replace(/\D/g, '').replace(/^0/, '62');
                const mapsUrl = (o.mapLink && o.mapLink.includes('http')) ? o.mapLink : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.alamat || "")}`;
                html += `<div class="order-item">
                    <span style="font-size:9px; color:var(--gold)">${o.tanggal} | ${o.waktu}</span><br>
                    <b>${o.noPesanan} - ${o.namaPembeli}</b><br>
                    <small>${o.status} | Rp${Number(o.total).toLocaleString()}</small>
                    ${o.buktiFoto ? `<button class="btn-small" style="background:var(--safe); width:100%; margin-top:8px;" onclick="viewFoto('${o.buktiFoto}')">🖼️ LIHAT BUKTI FOTO</button>` : ''}
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:8px;">
                        <a href="https://wa.me/${wa}" style="background:var(--wa); text-decoration:none; color:white; padding:8px; border-radius:8px; text-align:center; font-size:10px; font-weight:800;">WA</a>
                        <a href="${mapsUrl}" target="_blank" style="background:var(--blue); text-decoration:none; color:white; padding:8px; border-radius:8px; text-align:center; font-size:10px; font-weight:800;">MAPS</a>
                    </div>
                    <button style="background:var(--danger); width:100%; color:white; border:none; padding:8px; border-radius:8px; margin-top:5px; font-size:10px; font-weight:800;" onclick="hapus('${o.id}')">HAPUS</button>
                    <button style="background:var(--gold); width:100%; color:black; border:none; padding:8px; border-radius:8px; margin-top:5px; font-size:10px; font-weight:800;" onclick="reprint('${o.id}')">CETAK RESI</button>
                </div>`;
            });
            document.getElementById('adminList').innerHTML = html || `<p style="text-align:center; opacity:0.5;">Kosong.</p>`;
        }

        function viewFoto(src) { document.getElementById('imgBukti').src = src; document.getElementById('modalFoto').style.display = 'flex'; }
        function toggleTotal() { document.getElementById('total').style.display = document.getElementById('metodeBayar').value === 'Transfer' ? 'none' : 'block'; }

        function tambah() {
            const fisikDate = new Date();
            const d = { 
                noPesanan: document.getElementById('noPesanan').value || "#"+Date.now().toString().slice(-4), 
                namaPembeli: document.getElementById('pembeli').value, 
                nohp: document.getElementById('nohp').value, 
                alamat: document.getElementById('alamat').value, 
                mapLink: document.getElementById('mapLink').value, 
                total: document.getElementById('total').value || 0, 
                metode: document.getElementById('metodeBayar').value, 
                status: 'Menunggu', 
                tanggal: getFormattedDate(fisikDate), 
                waktu: fisikDate.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) 
            };
            if(!d.namaPembeli) return alert("Nama wajib!");
            db.ref('pesanan').push(d).then(() => { lastOrder = d; executePrint(); document.querySelectorAll('input, textarea').forEach(i => i.value = ""); });
        }

        function reprint(id) {
            lastOrder = allOrders.find(o => o.id === id);
            if(lastOrder) executePrint();
        }

        function executePrint() {
            if(!lastOrder) return;
            document.getElementById('receipt-content').innerHTML = `
                <div style="text-align:center; font-weight:bold; font-size:20px;">EJ TOBACCO</div>
                <div style="text-align:center; font-size:12px;">Delivery Express Service</div>
                <div class="line"></div>
                <div style="font-size:14px;">
                    <b>ID: ${lastOrder.noPesanan}</b><br>
                    TGL: ${lastOrder.tanggal} | ${lastOrder.waktu}<br>
                    <div class="line"></div>
                    PELANGGAN: ${lastOrder.namaPembeli}<br>
                    WA: ${lastOrder.nohp}<br>
                    ALAMAT: ${lastOrder.alamat}<br>
                    <div class="line"></div>
                    METODE: ${lastOrder.metode}<br>
                    <span style="font-size:18px; font-weight:bold;">TOTAL: Rp${Number(lastOrder.total).toLocaleString()}</span>
                </div>
                <div class="line"></div>
                <div style="text-align:center; font-size:11px;">Simpan resi ini sebagai bukti.<br>Terima kasih!</div>
            `;
            setTimeout(() => { window.print(); }, 500);
        }

        function setor() { 
            const dayKey = getFormattedDate(new Date()).replace(/\/| /g, '-');
            const j = Number(document.getElementById('jumlahSetoran').value); 
            db.ref('setoran/' + dayKey).transaction(cv => (cv || 0) + j).then(() => { alert("Setoran Diterima!"); document.getElementById('jumlahSetoran').value = ""; }); 
        }

        function hapus(id) { if(confirm("Hapus?")) db.ref('pesanan/' + id).remove(); }
        
        startClock();
    </script>
</body>
</html>
