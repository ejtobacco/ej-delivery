<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="manifest" href="manifest.json">

    <link rel="icon" href="logo-baru.png" type="image/png">
    <link rel="apple-touch-icon" href="logo-baru.png">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
    /* --- 1. IDENTITAS WARNA --- */
    :root { 
        --gold: #D4AF37; --bg: #050505; 
        --glass: rgba(255, 255, 255, 0.03); 
        --glass-border: rgba(212, 175, 55, 0.2); 
        --text-main: #FFFFFF; --safe: #22C55E; 
        --danger: #EF4444; --blue: #2563eb; --wa: #25D366; 
    }

    /* --- 2. RESET GLOBAL (RAHASIA SCROLL LANCAR) --- */
    * { 
        box-sizing: border-box; 
        margin: 0; padding: 0; 
        font-family: 'Plus Jakarta Sans', sans-serif;
        -webkit-tap-highlight-color: transparent;
    }

    html { 
        scroll-behavior: smooth; /* Biar kalau klik logo baliknya halus */
    }

    body { 
        background: var(--bg); 
        color: var(--text-main); 
        width: 100%;
        margin: 0;
        padding: 12px; /* Jarak aman pinggir agar tidak nempel kaca */
        overflow-x: hidden; /* Kunci biar gak goyang kanan-kiri */
        -webkit-user-select: none; /* Anti-Blok Teks */
        user-select: none;
    }

    /* PENTING: Sembunyikan garis abu-abu scrollbar biar bersih */
    ::-webkit-scrollbar { display: none; }

    /* Kolom input harus tetap bisa diketik */
    input, textarea { 
        -webkit-user-select: text; 
        user-select: text; 
        width: 100%;
    }

    /* Logo tidak bisa ditarik */
    img { pointer-events: none; -webkit-user-drag: none; }

    /* --- 3. KOMPONEN UI (FULL WIDTH) --- */
    .header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 15px;
    
    /* --- KODE SAKTI BIAR NEMPEL --- */
    position: sticky; 
    top: 0; 
    z-index: 9999; /* Biar tetap di atas kotak pesanan */
    background: var(--bg); /* Agar teks di bawah tidak tembus saat discroll */
    padding: 10px 0; /* Tambah sedikit ruang agar tidak terlalu mepet kaca */
    border-bottom: 1px solid var(--glass-border); /* Garis halus sebagai pembatas */
}

    .logo-text-container { display: flex; flex-direction: column; gap: 2px; cursor: pointer; }
    .main-logo-text { 
    color: var(--gold); 
    font-weight: 800; 
    font-size: 20px; 
    letter-spacing: 1px; 
    text-transform: uppercase; 
    /* Tambahkan baris di bawah ini */
    animation: goldBreathe 3s ease-in-out infinite; 
}
@keyframes goldBreathe {
    0% { opacity: 1; text-shadow: 0 0 5px var(--gold); }
    50% { opacity: 0.7; text-shadow: 0 0 20px var(--gold); }
    100% { opacity: 1; text-shadow: 0 0 5px var(--gold); }
}

.logo-text-container:active {
    transform: scale(0.95);
    transition: 0.1s;
}

    .report-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .report-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; }
    .report-box.active { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); }
    .report-box b { display: block; font-size: 14px; margin-top: 4px; }

    .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px; width: 100%; }
    
    input, textarea, select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px; outline: none; }
    .btn-main { background: linear-gradient(135deg, #F7E08C, #D4AF37); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
    
    .order-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0; }
    .btn-small { padding: 10px; border-radius: 8px; font-weight: 800; font-size: 10px; text-align: center; color: white; border: none; cursor: pointer; }

    /* --- MODAL & LOGIN (TETAP FULL) --- */
   .modal-foto { 
    display: none; /* Pastikan ini tertulis agar sembunyi di awal */
    position: fixed; 
    inset: 0; /* Mengunci semua sisi (Atas, Bawah, Kiri, Kanan) */
    background: rgba(0,0,0,0.95); 
    z-index: 100000; /* Harus lebih tinggi dari login overlay */
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    backdrop-filter: blur(10px); /* Efek blur biar mewah */
}

    /* --- LOGIN OVERLAY SYSTEM (REVISI GAHAR) --- */
#loginOverlay {
    position: fixed; 
    inset: 0; 
    background: #000; 
    z-index: 999999; /* Paling atas dari segalanya */
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center;
}

.pin-container { 
    text-align: center; 
    width: 100%; 
    max-width: 320px; 
    padding: 20px; 
}

.pin-display { 
    font-size: 40px; 
    letter-spacing: 15px; 
    margin: 30px 0; 
    color: var(--gold); 
    font-weight: 800;
    text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); /* Efek nyala emas */
}

.numpad { 
    display: grid; 
    grid-template-columns: 1fr 1fr 1fr; 
    gap: 20px; /* Jarak tombol biar nggak gampang salah pencet */
    width: 100%; 
}

.num-btn { 
    background: rgba(255,255,255,0.03); 
    border: 1px solid rgba(212, 175, 55, 0.2); 
    color: #fff; 
    width: 75px; 
    height: 75px; 
    border-radius: 50%; 
    font-size: 26px; 
    font-weight: 600; 
    cursor: pointer; 
    transition: 0.2s;
}

/* Efek pas tombol ditekan */
.num-btn:active { 
    background: var(--gold); 
    color: #000; 
    transform: scale(0.9); 
}

</style>


</head>

    <div class="header">

    <div class="main-logo-text">EJ TOBACCO</div>

</div>

        <div id="statusKoneksi" style="display: flex; align-items: center; gap: 5px; justify-content: flex-end; margin-top: 5px;">
    <div id="lampuKoneksi" style="width: 8px; height: 8px; background: var(--safe); border-radius: 50%; box-shadow: 0 0 10px var(--safe);"></div>
    <span id="teksKoneksi" style="font-size: 9px; font-weight: 800; color: var(--safe); letter-spacing: 1px;">SISTEM ONLINE</span>
</div>
        
        <div style="text-align: right;">
            <div id="runningClock" style="font-size: 14px; font-weight: 800; color: var(--safe);">00:00:00</div>
            <div id="currentDay" style="font-size: 9px; color: var(--gold); font-weight: 800;">TGL LOADING...</div>
        </div>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 15px;">
        <input type="date" id="datePicker" onchange="changeDate()" style="border-color: var(--gold); background: rgba(212, 175, 55, 0.1); color: var(--gold); text-align: center; font-weight: 800; flex: 1;">
        <button onclick="goToToday()" style="background: var(--gold); border: none; border-radius: 12px; padding: 0 15px; font-weight: 800; font-size: 10px; color: black; cursor: pointer;">HARI INI</button>

    <button onclick="bukaLaporan()" style="background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); color: var(--gold); padding: 16px; border-radius: 20px; font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">

</div>

        <div class="report-box" id="f-Terkirim" onclick="setFilter('Terkirim')" style="border-color: var(--safe);"><span>Sukses</span><b id="countSukses">0</b></div>

        <button class="btn-main" onclick="tambah()">SIMPAN & PRINT</button>

</div>


    <div id="waPrompt">
        <p id="waText" style="font-size:12px; margin-bottom:10px;">✅ Data Tersimpan!</p>
        <button id="btnWAOpen" style="background:white; color:black; border:none; padding:10px 20px; border-radius:10px; font-weight:800; width:100%;">KIRIM WA SEKARANG</button>
        <p onclick="document.getElementById('waPrompt').style.display='none'" style="margin-top:10px; font-size:10px; opacity:0.7; cursor:pointer;">Nanti Saja</p>
    </div>

    <div id="receipt-print"><div id="receipt-content"></div></div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVQGysGRlYJ2b4PekM3vaXKtx6UFvNlCk", databaseURL: "https://ej-tobacco-express-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let allOrders = [], totalSetoranGlobal = 0, currentFilter = "Semua", lastOrder = null, lastDateString = "";

        function formatTglDB(date) { const d = new Date(date); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
        function initDate() { const n = new Date(); document.getElementById('datePicker').value = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; lastDateString = formatTglDB(n); }
        initDate();

        function changeDate() { updateAll(); }
        function goToToday() { initDate(); updateAll(); }
        function setFilter(f) { currentFilter = f; document.querySelectorAll('.report-box').forEach(el => el.classList.remove('active')); document.getElementById('f-'+f).classList.add('active'); updateAll(); }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('runningClock').innerText = now.toLocaleTimeString('id-ID');
                document.getElementById('currentDay').innerText = now.toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'}).toUpperCase();
                if (formatTglDB(now) !== lastDateString) { lastDateString = formatTglDB(now); initDate(); updateAll(); }
            }, 1000);
        }

        db.ref('pesanan').on('value', snap => {
            const val = snap.val();
            allOrders = val ? Object.keys(val).map(k => ({id:k, ...val[k]})).reverse() : [];
            db.ref('setoran').on('value', sSnap => {
                totalSetoranGlobal = Object.values(sSnap.val() || {}).reduce((a, b) => a + b, 0);
                updateAll();
            });
        });

        function updateAll() {
            const pickerVal = document.getElementById('datePicker').value;
            if(!pickerVal) return;
            const p = pickerVal.split('-');
            const tglTarget = `${p[2]}/${p[1]}/${p[0]}`;
            updateDashboard(tglTarget);
            renderList(tglTarget);
        }

        function updateDashboard(tglTarget) {
            let s=0, g=0, p=0, codSukses=0;
            allOrders.forEach(o => {
                if (o.tanggal === tglTarget) {
                    if (o.status === 'Terkirim') s++;
                    else if (o.status === 'Gagal') g++;
                }
                if (o.status !== 'Terkirim' && o.status !== 'Gagal') p++;
                if (o.status === 'Terkirim' && o.metode === 'COD') codSukses += Number(o.total || 0);
            });
            document.getElementById('countSukses').innerText = s;
            document.getElementById('countGagal').innerText = g;
            document.getElementById('countProses').innerText = p;
            document.getElementById('dailyTunai').innerText = "Rp" + (codSukses - totalSetoranGlobal).toLocaleString();
        }

        function renderList() {
    // Ambil inputan dari kolom cari
    const keyword = document.getElementById('searchBar').value.toLowerCase();
    
    // Ambil tanggal aktif dari datePicker
    const pickerVal = document.getElementById('datePicker').value;
    const p = pickerVal.split('-');
    const tglAktif = `${p[2]}/${p[1]}/${p[0]}`;

    let html = "";
    
    // Filter data dengan logika "Cerdas"
    const filtered = allOrders.filter(o => {
        const matchSearch = (o.namaPembeli || "").toLowerCase().includes(keyword) || 
                            (o.noPesanan || "").toLowerCase().includes(keyword);
        
        let matchStatus;
        if (currentFilter === "Semua") {
            // Tab SISA: Cari global (biar ketemu meski beda tanggal)
            matchStatus = (o.status !== 'Terkirim' && o.status !== 'Gagal');
        } else {
            // Tab Sukses/Cancel: Per tanggal agar rapi
            matchStatus = (o.status === currentFilter && o.tanggal === tglAktif);
        }
        
        return matchSearch && matchStatus;
    });

    if(filtered.length === 0) {
        html = `<p style="text-align:center; opacity:0.5; padding:20px;">Data tidak ditemukan.</p>`;
    } else {
        filtered.forEach(o => {
            const waNum = String(o.nohp || "").replace(/\D/g, '').replace(/^0/, '62');
            
            html += `<div class="order-item">
                <span style="font-size:9px; color:var(--gold)">${o.tanggal} | ${o.waktu}</span><br>
                <b>${o.noPesanan} - ${o.namaPembeli}</b><br>
                <small>${o.status} | ${o.metode} | Rp${Number(o.total).toLocaleString()}</small>
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:8px;">
                    <a href="https://wa.me/${waNum}" style="background:var(--wa); text-decoration:none; color:white; padding:8px; border-radius:8px; text-align:center; font-size:10px; font-weight:800;">WA</a>
                    <button style="background:var(--gold); color:black; border:none; padding:8px; border-radius:8px; font-size:10px; font-weight:800;" onclick="reprint('${o.id}')">REPRINT</button>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:5px;">
                    ${o.buktiFoto ? 
                        `<button class="btn-small" style="background:var(--safe);" onclick="viewFoto('${o.buktiFoto}')">LIHAT FOTO</button>` : 
                        `<div style="background:var(--glass); color:gray; padding:8px; border-radius:8px; text-align:center; font-size:10px; border:1px solid rgba(255,255,255,0.05);">TANPA FOTO</div>`
                    }
                    
                    ${o.status === 'Terkirim' ? 
                        `<div style="background:rgba(255,255,255,0.05); color:#666; padding:10px; border-radius:10px; text-align:center; font-size:10px; font-weight:800; border:1px solid rgba(255,255,255,0.1); cursor:not-allowed;">🔒 TERKUNCI</div>` : 
                        `<button onclick="hapus('${o.id}')" style="background:rgba(239,68,68,0.1); color:#EF4444; border:1px solid #EF4444; padding:10px; border-radius:10px; font-size:10px; font-weight:800; cursor:pointer;">HAPUS</button>`
                    }
                </div>
            </div>`;
        });
    }
    document.getElementById('adminList').innerHTML = html;
}


        function viewFoto(src) { document.getElementById('imgBukti').src = src; document.getElementById('modalFoto').style.display = 'flex'; }
        function toggleTotal() { document.getElementById('total').style.display = document.getElementById('metodeBayar').value === 'Transfer' ? 'none' : 'block'; }

        function tambah() {
            const n = new Date();
            const nohpVal = document.getElementById('nohp').value;
            const d = { 
                noPesanan: document.getElementById('noPesanan').value || "#"+Date.now().toString().slice(-4), 
                namaPembeli: document.getElementById('pembeli').value, 
                nohp: nohpVal, 
                alamat: document.getElementById('alamat').value, 
                mapLink: document.getElementById('mapLink').value, 
                total: document.getElementById('total').value || 0, 
                metode: document.getElementById('metodeBayar').value, 
                status: 'Menunggu', 
                tanggal: formatTglDB(n), 
                waktu: n.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) 
            };
            if(!d.namaPembeli || !d.nohp) return alert("Nama & WA wajib!");
            
            db.ref('pesanan').push(d).then(() => { 
                lastOrder = d; 
                executePrint(); 
                showWANotif(d);
                document.querySelectorAll('.glass-card input, .glass-card textarea').forEach(i => i.value = ""); 
            });
        }

        function executePrint() {
            if(!lastOrder) return;
            const cleanNo = (lastOrder.noPesanan || "").replace(/[^a-zA-Z0-9]/g, "");
            const teks80mm = 
                `[C]<font size="big"><b>EJ TOBACCO DELIVERY</b></font>\n` +
                `[C]"belanja semakin nyaman menggunakan aplikasi toko ej"\n` +
                `[C]================================================\n` +
                `[C]<font size="big"><b>NO. RESI : ${lastOrder.noPesanan}</b></font>\n` +
                `[C]================================================\n` +
                `[L]<b>PENERIMA:</b>\n` +
                `[L]${lastOrder.namaPembeli}\n` +
                `[L]No. HP : ${lastOrder.nohp}\n\n` +
                `[L]<b>ALAMAT PENGIRIMAN:</b>\n` +
                `[L]${lastOrder.alamat}\n` +
                `[C]================================================\n` +
                `[L]METODE PEMBAYARAN: ${lastOrder.metode}\n` +
                `[L]TOTAL TAGIHAN    : Rp${Number(lastOrder.total).toLocaleString()}\n` +
                `[C]================================================\n` +
                `[C][b]code128,3,80,${cleanNo},yes\n\n` +
                `[C]------------------------------------------------\n` +
                `[C]Tgl: ${lastOrder.tanggal} ${lastOrder.waktu}\n` +
                `[C]HARAP VIDIO WAKTU UNBOXING PAKET\n\n\n\n\n`;
            window.location.href = "rawbt:" + encodeURI(teks80mm);
        }

        function showWANotif(d) {
            const waNumber = String(d.nohp).replace(/\D/g, '').replace(/^0/, '62');
            const linkMaps = d.mapLink ? `\n📍 Map: ${d.mapLink}` : "";
            const teksWA = `*EJ TOBACCO DELIVERY* 📦\n------------------------------------------\nHalo Kak *${d.namaPembeli.toUpperCase()}* 👋\n\nPesanan Anda sedang diproses kurir.\n\n*RINCIAN:* \n🆔 Resi: ${d.noPesanan}\n💰 Total: *Rp${Number(d.total).toLocaleString()}*\n💳 Bayar: *${d.metode}*\n📍 Tujuan: ${d.alamat}${linkMaps}\n\nMohon siapkan uang pas kalau COD ya. Terima kasih! 🙏`;

        // --- MESIN HITUNG LAPORAN EJ TOBACCO ---
function bukaLaporan() {
    const n = new Date();
    // Kita ambil bulan dan tahun saat ini secara otomatis
    const bulanSekarang = (n.getMonth() + 1).toString().padStart(2, '0'); 
    const tahunSekarang = n.getFullYear().toString(); 
    
    let totalOmzet = 0;
    let suksesCount = 0;
    let gagalCount = 0;
    let codCount = 0;
    let transferCount = 0;

    // Kita bongkar semua data di memori
    allOrders.forEach(o => {
        const p = o.tanggal.split('/'); // Memecah DD/MM/YYYY
        const bulanPesanan = p[1];
        const tahunPesanan = p[2];

        // Validasi: Apakah bulannya sama?
        if (bulanPesanan === bulanSekarang && tahunPesanan === tahunSekarang) {
            if (o.status === 'Terkirim') {
                suksesCount++;
                totalOmzet += Number(o.total || 0);
                if (o.metode === 'COD') codCount++; else transferCount++;
            } else if (o.status === 'Gagal') {
                gagalCount++;
            }
        }
    });

 // Template dengan padding yang lebih lega (18px)
const template = `
    <div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.05); padding:18px 0; align-items:center;">
        <span style="opacity:0.6; font-size:13px;">💰 Omzet Terkirim:</span>
        <b style="color:var(--safe); font-size:18px;">Rp ${totalOmzet.toLocaleString()}</b>
    </div>
    <div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.05); padding:18px 0; align-items:center;">
        <span style="opacity:0.6; font-size:13px;">📦 Paket Berhasil:</span>
        <b style="font-size:16px;">${suksesCount} Item</b>
    </div>
    <div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.05); padding:18px 0; align-items:center;">
        <span style="opacity:0.6; font-size:13px;">❌ Paket Gagal:</span>
        <b style="color:var(--danger); font-size:16px;">${gagalCount} Item</b>
    </div>
    <div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.05); padding:18px 0; align-items:center;">
        <span style="opacity:0.6; font-size:13px;">🤝 Metode COD:</span>
        <b style="font-size:16px;">${codCount}</b>
    </div>
    <div style="display:flex; justify-content:space-between; padding:18px 0; align-items:center;">
        <span style="opacity:0.6; font-size:13px;">💳 Metode Transfer:</span>
        <b style="font-size:16px;">${transferCount}</b>
    </div>
    <div style="margin-top:25px; padding:15px; background:rgba(212,175,55,0.08); border-radius:15px; text-align:center; border:1px dashed rgba(212,175,55,0.2);">
        <small style="color:var(--gold); font-weight:800; text-transform:uppercase; letter-spacing:1px;">Periode: ${n.toLocaleString('id-ID', {month:'long', year:'numeric'})}</small>
    </div>
`;

    // Tembakkan ke layar
    document.getElementById('isiLaporan').innerHTML = template;

}

let radarMesin; // Variabel penampung peta

function bukaRadar() {
    // 1. Munculkan Layar
    document.getElementById('petaOverlay').style.display = 'flex';
    
    // 2. Bersihkan peta lama kalau ada (biar tidak error)
    if (radarMesin) { radarMesin.remove(); }

    // 3. Nyalakan Mesin Peta (Titik Tengah Brebes)
    radarMesin = L.map('mapRadar').setView([-6.87, 109.03], 12);

    // 4. Pasang Gambar Peta Hitam Mewah (GRATIS)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; EJ TOBACCO'
    }).addTo(radarMesin);

    // 5. Tebar Titik Emas Pelanggan yang Sudah Terkirim
    allOrders.forEach(o => {
        if (o.status === 'Terkirim' && o.mapLink) {
            let koordinat = extractCoords(o.mapLink);
            if (koordinat) {
                L.circleMarker([koordinat.lat, koordinat.lng], {
                    radius: 8,
                    fillColor: "#D4AF37", // EMAS
                    color: "#fff",
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(radarMesin).bindPopup(`<b>${o.namaPembeli}</b><br>${o.noPesanan}`);
            }
        }
    });
}

// Alat bantu ambil angka lokasi dari link maps
function extractCoords(url) {
    try {
        const reg = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
        const match = url.match(reg);
        if (match) return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
        if (url.includes('q=')) {
            const p = url.split('q=')[1].split('&')[0].split(',');
            return { lat: parseFloat(p[0]), lng: parseFloat(p[1]) };
        }
    } catch(e) { return null; }
}
