<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - EJ DELIVERY PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --gold-gradient: linear-gradient(135deg, #F7E08C, #D4AF37, #B8860B); --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2); --text-main: #FFFFFF; --safe: #22C55E; --danger: #EF4444; --blue: #2563eb; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 15px; padding-bottom: 50px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        input, textarea, select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px; outline: none; }
        .btn-main { background: var(--gold-gradient); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        .btn-danger { background: var(--danger); color: white; padding: 8px; border-radius: 8px; border: none; font-size: 10px; margin-top: 10px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        .order-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 0; }
        .report-box { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
        .report-box span { font-size: 9px; font-weight: 800; color: var(--gold); text-transform: uppercase; }
        .report-box b { display: block; font-size: 20px; margin-top: 5px; }
        #receipt-print { display: none; }
        @media print { body * { visibility: hidden; } #receipt-print, #receipt-print * { visibility: visible; } #receipt-print { position: absolute; left: 0; top: 0; width: 100%; color: black; font-family: monospace; } }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color: var(--gold)">EJ ADMIN PRO</h2>
        <div id="currentMonthLabel" style="font-size: 11px; font-weight: 800; background: var(--glass); padding: 5px 10px; border-radius: 8px;">MARET 2026</div>
    </div>

    <div class="report-box">
        <span>Total Paket Terkirim (Bulan Ini)</span>
        <b id="monthlyPaket">0 Paket</b>
    </div>
    <div class="report-box" style="background: rgba(34, 197, 94, 0.1); border-color: var(--safe);">
        <span style="color: var(--safe);">Total Omset COD (Bulan Ini)</span>
        <b id="monthlyCod" style="color: var(--safe);">Rp0</b>
    </div>

    <div class="glass-card">
        <h3 style="margin-bottom:12px; font-size:14px;">Input Pesanan Baru</h3>
        <input type="text" id="noPesanan" placeholder="No Pesanan">
        <input type="text" id="pembeli" placeholder="Nama Pembeli">
        <input type="text" id="nohp" placeholder="No WhatsApp">
        <textarea id="alamat" placeholder="Alamat Lengkap"></textarea>
        <input type="text" id="mapLink" placeholder="Link Map (Optional)">
        <select id="metodeBayar" onchange="toggleTotal()"><option value="COD">COD</option><option value="Transfer">Transfer</option></select>
        <input type="number" id="total" placeholder="Harga COD (Rp)">
        <button class="btn-main" onclick="tambah()">SIMPAN DATA</button>
        <button id="btnPrint" class="btn-main" style="margin-top:10px; background:white; display:none;" onclick="cetak()">📄 CETAK RESI</button>
    </div>

    <div class="glass-card">
        <button class="btn-main" style="background:var(--blue); color:white; margin-bottom:15px;" onclick="track()">📍 PANTAU POSISI KURIR</button>
        <h3 style="margin-bottom:10px; font-size:14px; color:var(--safe)">Setoran Tunai</h3>
        <input type="number" id="jumlahSetoran" placeholder="Jumlah (Rp)">
        <button class="btn-main" style="background:var(--safe); color:white" onclick="setor()">CATAT SETORAN</button>
    </div>

    <div id="adminList" class="glass-card">Memuat data...</div>

    <div id="receipt-print"><div style="text-align:center; padding: 20px;"><h3>EJ TOBACCO DELIVERY</h3><p>-------------------------</p><div id="receipt-content" style="text-align:left;"></div><p>-------------------------</p></div></div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVQGysGRlYJ2b4PekM3vaXKtx6UFvNlCk", databaseURL: "https://ej-tobacco-express-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let lastOrder = null;
        const now = new Date();

        function toggleTotal() { document.getElementById('total').style.display = document.getElementById('metodeBayar').value === 'Transfer' ? 'none' : 'block'; }

        db.ref('pesanan').on('value', snap => {
            const data = snap.val() || {};
            let html = ""; let countBulanIni = 0; let codBulanIni = 0;
            Object.keys(data).reverse().forEach(k => {
                const o = data[k];
                if (o.status === 'Terkirim' && o.tanggal.includes("/" + now.getFullYear())) {
                    const dateParts = o.tanggal.split("/");
                    if (parseInt(dateParts[1]) === (now.getMonth() + 1)) {
                        countBulanIni++;
                        if (o.metode === 'COD') codBulanIni += Number(o.total);
                    }
                }
                html += `<div class="order-item"><span style="font-size:10px; color:var(--gold)">${o.tanggal} | ${o.noPesanan}</span><br><b>${o.namaPembeli}</b><br><small>${o.status} | ${o.metode} | Rp${Number(o.total).toLocaleString()}</small><br><button class="btn-danger" onclick="hapus('${k}')">HAPUS</button></div>`;
            });
            document.getElementById('monthlyPaket').innerText = countBulanIni + " Paket";
            document.getElementById('monthlyCod').innerText = "Rp" + codBulanIni.toLocaleString();
            document.getElementById('adminList').innerHTML = html || "Kosong";
        });

        function tambah() {
            const d = { noPesanan: document.getElementById('noPesanan').value, namaPembeli: document.getElementById('pembeli').value, nohp: document.getElementById('nohp').value, alamat: document.getElementById('alamat').value, mapLink: document.getElementById('mapLink').value, total: document.getElementById('total').value || 0, metode: document.getElementById('metodeBayar').value, status: 'Menunggu', tanggal: now.toLocaleDateString('id-ID'), waktu: now.toLocaleTimeString('id-ID') };
            db.ref('pesanan').push(d).then(() => { lastOrder = d; document.getElementById('btnPrint').style.display = 'block'; alert('Simpan!'); });
        }

        function cetak() { document.getElementById('receipt-content').innerHTML = `NO: ${lastOrder.noPesanan}<br>NAMA: ${lastOrder.namaPembeli}<br>BAYAR: ${lastOrder.metode}<br>TOTAL: Rp${Number(lastOrder.total).toLocaleString()}`; window.print(); }
        function hapus(id) { if(confirm("Hapus?")) db.ref('pesanan/' + id).remove(); }
        function setor() { const j = Number(document.getElementById('jumlahSetoran').value); const t = now.toLocaleDateString('id-ID').replace(/\//g, '-'); db.ref('setoran/' + t).transaction(cv => (cv || 0) + j).then(() => alert("Berhasil!")); }
        function track() { db.ref('tracking/kurir_ej').once('value', s => { if(s.val()) window.location.href=`http://googleusercontent.com/maps.google.com/maps?q=${s.val().lat},${s.val().lng}`; else alert("Offline"); }); }
    </script>
</body>
</html>
