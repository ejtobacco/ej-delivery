<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EJ ADMIN PRO - FULL SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2); --text-main: #FFFFFF; --safe: #22C55E; --danger: #EF4444; --blue: #2563eb; --wa: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); padding: 12px; overflow-x: hidden; user-select: none; }
        ::-webkit-scrollbar { display: none; }
        input, textarea { -webkit-user-select: text; user-select: text; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; position: sticky; top: 0; z-index: 9999; background: var(--bg); padding: 10px 0; border-bottom: 1px solid var(--glass-border); }
        .logo-text-container { display: flex; flex-direction: column; gap: 2px; cursor: pointer; }
        .main-logo-text { color: var(--gold); font-weight: 800; font-size: 20px; text-transform: uppercase; animation: goldBreathe 3s ease-in-out infinite; }
        @keyframes goldBreathe { 0%, 100% { opacity: 1; text-shadow: 0 0 5px var(--gold); } 50% { opacity: 0.7; text-shadow: 0 0 20px var(--gold); } }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px; }
        .report-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 10px 5px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 11px; }
        .report-box.active { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); }
        .report-box b { display: block; font-size: 14px; margin-top: 4px; }
        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px; width: 100%; }
        input, textarea, select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px; outline: none; }
        .btn-main { background: linear-gradient(135deg, #F7E08C, #D4AF37); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        .order-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0; }
        .btn-small { padding: 10px; border-radius: 8px; font-weight: 800; font-size: 10px; text-align: center; color: white; border: none; cursor: pointer; }
        .modal-foto { display: none; position: fixed; z-index: 2000000; left: 0; top: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-foto img { max-width: 90%; max-height: 75vh; border: 2px solid var(--gold); border-radius: 15px; object-fit: contain; }
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin-container { text-align: center; width: 100%; max-width: 320px; }
        .pin-display { font-size: 40px; letter-spacing: 15px; margin: 30px 0; color: var(--gold); font-weight: 800; }
        .numpad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .num-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(212, 175, 55, 0.2); color: #fff; width: 70px; height: 70px; border-radius: 50%; font-size: 24px; font-weight: 600; }
        #waPrompt { position: fixed; bottom: 30px; left: 20px; right: 20px; background: var(--wa); color: white; padding: 20px; border-radius: 20px; text-align: center; z-index: 2000000; display: none; }
        #mapRadar { width: 100%; height: 100%; background: #000 !important; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="pin-container">
            <h2 style="color:#fff; margin-bottom:10px;">EJ ACCESS</h2>
            <div class="pin-display" id="pinDisplay">****</div>
            <div class="numpad">
                <button class="num-btn" onclick="pressPin('1')">1</button><button class="num-btn" onclick="pressPin('2')">2</button><button class="num-btn" onclick="pressPin('3')">3</button>
                <button class="num-btn" onclick="pressPin('4')">4</button><button class="num-btn" onclick="pressPin('5')">5</button><button class="num-btn" onclick="pressPin('6')">6</button>
                <button class="num-btn" onclick="pressPin('7')">7</button><button class="num-btn" onclick="pressPin('8')">8</button><button class="num-btn" onclick="pressPin('9')">9</button>
                <button class="num-btn" onclick="pressPin('C')" style="color:var(--danger)">C</button><button class="num-btn" onclick="pressPin('0')">0</button><button class="num-btn" onclick="pressPin('OK')" style="color:var(--safe)">OK</button>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="logo-text-container" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            <div class="main-logo-text">EJ TOBACCO</div>
            <div style="font-size:9px; letter-spacing:1px; color:#fff;">DELIVERY SYSTEM</div>
        </div>
        <div style="text-align: right;">
            <div id="runningClock" style="font-size: 14px; font-weight: 800; color: var(--safe);">00:00:00</div>
            <div id="currentDay" style="font-size: 9px; color: var(--gold); font-weight: 800;">LOADING...</div>
        </div>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 15px;">
        <input type="date" id="datePicker" onchange="changeDate()" style="border-color: var(--gold); background: rgba(212, 175, 55, 0.1); color: var(--gold); text-align: center; font-weight: 800; flex: 1; margin:0;">
        <button onclick="goToToday()" style="background: var(--gold); border: none; border-radius: 12px; padding: 0 15px; font-weight: 800; font-size: 10px; color: black;">HARI INI</button>
    </div>

    <div class="report-grid">
        <div class="report-box" id="f-Gudang" onclick="setFilter('Gudang')" style="border-color: var(--blue);"><span>Gudang</span><b id="countGudang">0</b></div>
        <div class="report-box active" id="f-Semua" onclick="setFilter('Semua')"><span>Jalan</span><b id="countProses">0</b></div>
        <div class="report-box" id="f-Terkirim" onclick="setFilter('Terkirim')" style="border-color: var(--safe);"><span>Sukses</span><b id="countSukses">0</b></div>
        <div class="report-box" id="f-Gagal" onclick="setFilter('Gagal')" style="border-color: var(--danger);"><span>Gagal</span><b id="countGagal">0</b></div>
    </div>

    <div class="report-box" style="margin-bottom: 15px; border-color: var(--safe); background: rgba(34, 197, 94, 0.05); width:100%; cursor: default;">
        <span style="color: var(--safe); font-size: 10px; font-weight: 800;">TOTAL SALDO COD DI KURIR</span>
        <b id="dailyTunai" style="font-size: 20px; color: var(--safe);">Rp0</b>
    </div>

    <div class="glass-card">
        <input type="text" id="noPesanan" placeholder="No Pesanan (#001)">
        <input type="text" id="pembeli" placeholder="Nama Pembeli">
        <input type="text" id="nohp" placeholder="WhatsApp (08xx)">
        <textarea id="alamat" placeholder="Alamat Lengkap"></textarea>
        <input type="text" id="mapLink" placeholder="Link Google Maps">
        <select id="metodeBayar" onchange="toggleTotal()"><option value="COD">COD</option><option value="Transfer">Transfer</option></select>
        <input type="number" id="total" placeholder="Harga COD (Rp)">
        <label style="color: var(--danger); font-size: 11px; font-weight: 800; display: flex; align-items: center; gap: 8px; margin-bottom: 15px; cursor: pointer;">
            <input type="checkbox" id="isUrgent" style="width: 18px; height: 18px;"> 🔥 TANDAI SEBAGAI PESANAN URGENT
        </label>
        <button class="btn-main" onclick="tambah()">SIMPAN & PRINT</button>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
        <button onclick="bukaLaporan()" style="background:var(--glass); border:1px solid var(--gold); color:var(--gold); padding:12px; border-radius:12px; font-weight:800; font-size:10px;">📊 LAPORAN</button>
        <button onclick="bukaRadar()" style="background:var(--glass); border:1px solid var(--blue); color:var(--blue); padding:12px; border-radius:12px; font-weight:800; font-size:10px;">📡 RADAR</button>
    </div>

    <input type="text" id="searchBar" placeholder="🔍 Cari nama/resi..." oninput="renderList()" style="border:1px solid var(--gold);">
    <div id="adminList" class="glass-card">Memuat data...</div>

    <div id="modalFoto" class="modal-foto" onclick="this.style.display='none'"><img id="imgBukti" src=""></div>

    <div id="waPrompt">
        <p id="waText" style="font-size:12px; margin-bottom:10px;">✅ Data Tersimpan!</p>
        <button id="btnWAOpen" style="background:white; color:black; border:none; padding:10px 20px; border-radius:10px; font-weight:800; width:100%;">KIRIM WA SEKARANG</button>
    </div>

    <div id="laporanOverlay" class="modal-foto" style="padding: 20px;">
        <div class="glass-card" style="background:#000; border:1px solid var(--gold); width:100%; max-width:400px;">
            <h3 style="color:var(--gold); text-align:center; margin-bottom:15px;">REKAP BULANAN</h3>
            <div id="isiLaporan"></div>
            <button class="btn-main" style="margin-top:15px;" onclick="document.getElementById('laporanOverlay').style.display='none'">TUTUP</button>
        </div>
    </div>

    <div id="petaOverlay" class="modal-foto">
        <div style="width:90%; height:80%; position:relative; border:1px solid var(--gold); border-radius:15px; overflow:hidden;">
            <div id="mapRadar"></div>
            <button onclick="document.getElementById('petaOverlay').style.display='none'" style="position:absolute; top:10px; right:10px; z-index:10000; background:red; color:white; border:none; padding:10px; border-radius:8px;">X</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVQGysGRlYJ2b4PekM3vaXKtx6UFvNlCk", databaseURL: "https://ej-tobacco-express-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allOrders = [], totalSetoranGlobal = 0, currentFilter = "Semua", lastOrder = null, lastDateString = "";

        function formatTglDB(date) { const d = new Date(date); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
        function initDate() { const n = new Date(); document.getElementById('datePicker').value = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; lastDateString = formatTglDB(n); }
        initDate();

        function pressPin(val) {
            const disp = document.getElementById('pinDisplay');
            if (val === 'C') { window.inputPin = ""; }
            else if (val === 'OK') { if (window.inputPin === "1234") document.getElementById('loginOverlay').style.display = 'none'; else { alert("SALAH!"); window.inputPin = ""; } }
            else { if (!window.inputPin) window.inputPin = ""; if (window.inputPin.length < 4) window.inputPin += val; }
            disp.innerText = window.inputPin ? "*".repeat(window.inputPin.length) : "****";
        }

        db.ref('pesanan').on('value', snap => {
            const val = snap.val();
            allOrders = val ? Object.keys(val).map(k => ({id:k, ...val[k]})).reverse() : [];
            db.ref('setoran').on('value', sSnap => {
                totalSetoranGlobal = Object.values(sSnap.val() || {}).reduce((a, b) => a + b, 0);
                updateAll();
            });
        });

        function updateAll() {
            const pickerVal = document.getElementById('datePicker').value;
            if(!pickerVal) return;
            const p = pickerVal.split('-');
            const tglTarget = `${p[2]}/${p[1]}/${p[0]}`;
            updateDashboard(tglTarget);
            renderList();
        }

        function updateDashboard(tgl) {
            let s=0, g=0, p=0, gd=0, cod=0;
            allOrders.forEach(o => {
                if (o.status === 'Gudang') gd++;
                if (o.status !== 'Terkirim' && o.status !== 'Gagal' && o.status !== 'Gudang') p++;
                if (o.tanggal === tgl) { if (o.status === 'Terkirim') s++; else if (o.status === 'Gagal') g++; }
                if (o.status === 'Terkirim' && o.metode === 'COD') cod += Number(o.total || 0);
            });
            document.getElementById('countGudang').innerText = gd;
            document.getElementById('countProses').innerText = p;
            document.getElementById('countSukses').innerText = s;
            document.getElementById('countGagal').innerText = g;
            document.getElementById('dailyTunai').innerText = "Rp" + (cod - totalSetoranGlobal).toLocaleString();
        }

        function renderList() {
            const key = document.getElementById('searchBar').value.toLowerCase();
            const tgl = formatTglDB(document.getElementById('datePicker').value);
            let html = "";
            const filtered = allOrders.filter(o => {
                const matchK = (o.namaPembeli||"").toLowerCase().includes(key) || (o.noPesanan||"").toLowerCase().includes(key);
                let matchS;
                if (currentFilter === "Semua") matchS = (o.status !== 'Terkirim' && o.status !== 'Gagal' && o.status !== 'Gudang');
                else if (currentFilter === "Gudang") matchS = (o.status === 'Gudang');
                else matchS = (o.status === currentFilter && o.tanggal === tgl);
                return matchK && matchS;
            });
            filtered.forEach(o => {
                const wa = String(o.nohp||"").replace(/\D/g, '').replace(/^0/, '62');
                html += `<div class="order-item">
                    <span style="font-size:9px; color:var(--gold)">${o.tanggal} ${o.waktu}</span><br>
                    <b>${o.noPesanan} - ${o.namaPembeli}</b><br>
                    <small>${o.status} | ${o.metode} | Rp${Number(o.total).toLocaleString()}</small>
                    ${o.catatanKurir ? `<div style="font-size:11px; color:var(--safe);">📝 ${o.catatanKurir}</div>` : ''}
                    ${o.alasanTunda ? `<div style="font-size:11px; color:var(--danger);">⚠️ ${o.alasanTunda}</div>` : ''}
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:8px;">
                        <a href="https://wa.me/${wa}" style="background:var(--wa); text-decoration:none; color:white; padding:8px; border-radius:8px; text-align:center; font-size:10px; font-weight:800;">WA</a>
                        <button style="background:var(--gold); color:black; border:none; padding:8px; border-radius:8px; font-size:10px; font-weight:800;" onclick="reprint('${o.id}')">REPRINT</button>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:5px;">
                        ${o.buktiFoto ? `<button class="btn-small" style="background:var(--safe);" onclick="viewFoto('${o.buktiFoto}')">FOTO</button>` : `<div style="font-size:10px; opacity:0.5;">TANPA FOTO</div>`}
                        <button onclick="hapus('${o.id}')" style="background:rgba(239,68,68,0.1); color:red; border:none; border-radius:8px; font-size:10px;">HAPUS</button>
                    </div>
                </div>`;
            });
            document.getElementById('adminList').innerHTML = html || "<p style='text-align:center; opacity:0.5;'>Kosong</p>";
        }

        function tambah() {
            const n = new Date();
            const d = { 
                noPesanan: document.getElementById('noPesanan').value || "#"+Date.now().toString().slice(-4),
                namaPembeli: document.getElementById('pembeli').value, 
                nohp: document.getElementById('nohp').value, 
                alamat: document.getElementById('alamat').value, 
                mapLink: document.getElementById('mapLink').value, 
                total: document.getElementById('total').value || 0, 
                metode: document.getElementById('metodeBayar').value,
                urgent: document.getElementById('isUrgent').checked,
                status: 'Gudang', tanggal: formatTglDB(n), waktu: n.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})
            };
            if(!d.namaPembeli) return alert("Nama Kosong!");
            db.ref('pesanan').push(d).then(() => { 
                lastOrder = d; executePrint();
                document.getElementById('waPrompt').style.display='block';
                document.getElementById('btnWAOpen').onclick = () => { 
                    const txt = `*EJ TOBACCO DELIVERY*\nHalo Kak ${d.namaPembeli.toUpperCase()}\nPesanan Anda diproses.\nResi: ${d.noPesanan}\nTotal: Rp${Number(d.total).toLocaleString()}`;
                    window.open(`https://wa.me/${String(d.nohp).replace(/\D/g, '').replace(/^0/, '62')}?text=${encodeURIComponent(txt)}`, '_blank');
                    document.getElementById('waPrompt').style.display='none';
                };
                ['noPesanan','pembeli','nohp','alamat','mapLink','total'].forEach(id => document.getElementById(id).value="");
            });
        }

        function executePrint() {
            if(!lastOrder) return;
            const resi = (lastOrder.noPesanan||"").replace(/[^a-zA-Z0-9]/g, "");
            const raw = `[C]<b>EJ TOBACCO DELIVERY</b>\n[C]================================\n[C]<b>NO. RESI : ${lastOrder.noPesanan}</b>\n[C]================================\n[L]PENERIMA: ${lastOrder.namaPembeli}\n[L]ALAMAT: ${lastOrder.alamat}\n[L]METODE: ${lastOrder.metode}\n[L]TOTAL: Rp${Number(lastOrder.total).toLocaleString()}\n[C]================================\n[C][b]code128,3,80,${resi},yes\n\n[C]Tgl: ${lastOrder.tanggal}\n\n\n\n`;
            window.location.href = "rawbt:" + encodeURI(raw);
        }

        function reprint(id) { lastOrder = allOrders.find(o => o.id === id); executePrint(); }
        function hapus(id) { if(confirm("Hapus?")) db.ref('pesanan/'+id).remove(); }
        function setFilter(f) { currentFilter = f; document.querySelectorAll('.report-box').forEach(el => el.classList.remove('active')); document.getElementById('f-'+f).classList.add('active'); renderList(); }
        function viewFoto(src) { document.getElementById('modalFoto').style.display='flex'; document.getElementById('imgBukti').src=src; }
        function toggleTotal() { document.getElementById('total').style.display = document.getElementById('metodeBayar').value==='Transfer'?'none':'block'; }
        
        function bukaLaporan() {
            const n = new Date();
            let total = 0, s = 0;
            allOrders.forEach(o => {
                const p = o.tanggal.split('/');
                if(p[1] === (n.getMonth()+1).toString().padStart(2,'0')) {
                    if(o.status === 'Terkirim') { s++; total += Number(o.total||0); }
                }
            });
            document.getElementById('isiLaporan').innerHTML = `<p>Omzet: Rp ${total.toLocaleString()}</p><p>Sukses: ${s} Paket</p>`;
            document.getElementById('laporanOverlay').style.display='flex';
        }

        let radar;
        function bukaRadar() {
            document.getElementById('petaOverlay').style.display='flex';
            if(radar) radar.remove();
            radar = L.map('mapRadar').setView([-6.87, 109.03], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radar);
            setTimeout(() => radar.invalidateSize(), 300);
        }

        setInterval(() => {
            const n = new Date();
            document.getElementById('runningClock').innerText = n.toLocaleTimeString('id-ID');
            document.getElementById('currentDay').innerText = n.toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'}).toUpperCase();
        }, 1000);
    </script>
</body>
</html>
