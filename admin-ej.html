<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EJ ADMIN PRO - FULL SYSTEM</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="icon" href="logo-baru.png" type="image/png">
    <link rel="apple-touch-icon" href="logo-baru.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
    /* --- 1. IDENTITAS WARNA --- */
    :root { 
        --gold: #D4AF37; --bg: #050505; 
        --glass: rgba(255, 255, 255, 0.03); 
        --glass-border: rgba(212, 175, 55, 0.2); 
        --text-main: #FFFFFF; --safe: #22C55E; 
        --danger: #EF4444; --blue: #2563eb; --wa: #25D366; 
    }

    /* --- 2. RESET GLOBAL (RAHASIA SCROLL LANCAR) --- */
    * { 
        box-sizing: border-box; 
        margin: 0; padding: 0; 
        font-family: 'Plus Jakarta Sans', sans-serif;
        -webkit-tap-highlight-color: transparent;
    }

    html { 
        scroll-behavior: smooth; /* Biar kalau klik logo baliknya halus */
    }

    body { 
        background: var(--bg); 
        color: var(--text-main); 
        width: 100%;
        margin: 0;
        padding: 12px; /* Jarak aman pinggir agar tidak nempel kaca */
        overflow-x: hidden; /* Kunci biar gak goyang kanan-kiri */
        -webkit-user-select: none; /* Anti-Blok Teks */
        user-select: none;
    }

    /* PENTING: Sembunyikan garis abu-abu scrollbar biar bersih */
    ::-webkit-scrollbar { display: none; }

    /* Kolom input harus tetap bisa diketik */
    input, textarea { 
        -webkit-user-select: text; 
        user-select: text; 
        width: 100%;
    }

    /* Logo tidak bisa ditarik */
    img { pointer-events: none; -webkit-user-drag: none; }

    /* --- 3. KOMPONEN UI (FULL WIDTH) --- */
    .header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 15px;
    
    /* --- KODE SAKTI BIAR NEMPEL --- */
    position: sticky; 
    top: 0; 
    z-index: 9999; /* Biar tetap di atas kotak pesanan */
    background: var(--bg); /* Agar teks di bawah tidak tembus saat discroll */
    padding: 10px 0; /* Tambah sedikit ruang agar tidak terlalu mepet kaca */
    border-bottom: 1px solid var(--glass-border); /* Garis halus sebagai pembatas */
}

    .logo-text-container { display: flex; flex-direction: column; gap: 2px; cursor: pointer; }
    .main-logo-text { 
    color: var(--gold); 
    font-weight: 800; 
    font-size: 20px; 
    letter-spacing: 1px; 
    text-transform: uppercase; 
    /* Tambahkan baris di bawah ini */
    animation: goldBreathe 3s ease-in-out infinite; 
}
@keyframes goldBreathe {
    0% { opacity: 1; text-shadow: 0 0 5px var(--gold); }
    50% { opacity: 0.7; text-shadow: 0 0 20px var(--gold); }
    100% { opacity: 1; text-shadow: 0 0 5px var(--gold); }
}

.logo-text-container:active {
    transform: scale(0.95);
    transition: 0.1s;
}

    .report-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .report-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; }
    .report-box.active { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); }
    .report-box b { display: block; font-size: 14px; margin-top: 4px; }

    .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px; width: 100%; }
    
    input, textarea, select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px; outline: none; }
    .btn-main { background: linear-gradient(135deg, #F7E08C, #D4AF37); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
    
    .order-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0; }
    .btn-small { padding: 10px; border-radius: 8px; font-weight: 800; font-size: 10px; text-align: center; color: white; border: none; cursor: pointer; }

    /* --- MODAL & LOGIN (TETAP FULL) --- */
   .modal-foto { 
    display: none; 
    position: fixed; 
    /* Gunakan z-index super tinggi agar di depan segalanya */
    z-index: 2000000 !important; 
    left: 0;
    top: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.9); 
    /* Menggunakan Flex agar gambar tepat di tengah layar */
    display: none; /* Awalnya sembunyi */
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    backdrop-filter: blur(8px);
}

.modal-foto img { 
    /* Biar gambar tidak "nge-zoom" atau kebesaran */
    max-width: 90%; 
    max-height: 75vh; 
    border: 2px solid var(--gold); 
    border-radius: 15px; 
    object-fit: contain;
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
}


    /* --- LOGIN OVERLAY SYSTEM (REVISI GAHAR) --- */
#loginOverlay {
    position: fixed; 
    inset: 0; 
    background: #000; 
    z-index: 999999; /* Paling atas dari segalanya */
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center;
}

.pin-container { 
    text-align: center; 
    width: 100%; 
    max-width: 320px; 
    padding: 20px; 
}

.pin-display { 
    font-size: 40px; 
    letter-spacing: 15px; 
    margin: 30px 0; 
    color: var(--gold); 
    font-weight: 800;
    text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); /* Efek nyala emas */
}

.numpad { 
    display: grid; 
    grid-template-columns: 1fr 1fr 1fr; 
    gap: 20px; /* Jarak tombol biar nggak gampang salah pencet */
    width: 100%; 
}

.num-btn { 
    background: rgba(255,255,255,0.03); 
    border: 1px solid rgba(212, 175, 55, 0.2); 
    color: #fff; 
    width: 75px; 
    height: 75px; 
    border-radius: 50%; 
    font-size: 26px; 
    font-weight: 600; 
    cursor: pointer; 
    transition: 0.2s;
}

/* Efek pas tombol ditekan */
.num-btn:active { 
    background: var(--gold); 
    color: #000; 
    transform: scale(0.9); 
}

#waPrompt { 
    position: fixed; 
    bottom: 30px; 
    left: 20px; 
    right: 20px; 
    background: var(--wa); 
    color: white; 
    padding: 20px; 
    border-radius: 20px; 
    text-align: center; 
    z-index: 2000000; /* Pastikan di atas segalanya */
    box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
    display: none; 
}

/* --- FIX RADAR: PETA MUNCUL & BERSIH --- */
#mapRadar {
    width: 100%;
    height: 100%;
    background: #000 !important; /* Latar dasar hitam */
}

/* Pastikan gambar peta (Tile) tetap muncul */
.leaflet-tile-container img {
    display: block !important;
    visibility: visible !important;
    opacity: 1 !important;
}

/* Hapus bayangan emas/grid yang nyasar masuk ke peta */
#mapRadar .leaflet-pane, 
#mapRadar .leaflet-control-container {
    box-shadow: none !important;
    text-shadow: none !important;
}

/* Kotak popup alamat agar tidak transparan */
.leaflet-popup-content-wrapper, .leaflet-popup-tip {
    background: #111 !important;
    color: var(--gold) !important;
    border: 1px solid var(--gold);
}

</style>


</head>
<body>

    <div id="loginOverlay">
    <div class="pin-container">
        <div style="margin-bottom: 20px;">
            <h2 style="color:#fff; font-size:22px; font-family:'Space Grotesk';">EJ ACCESS</h2>
            <p style="color:var(--muted); font-size:11px; letter-spacing:2px;">SECURITY VERIFICATION</p>
        </div>

            <button class="num-btn" onclick="pressPin('5')">5</button>
            <button class="num-btn" onclick="pressPin('6')">6</button>
            <button class="num-btn" onclick="pressPin('7')">7</button>
            <button class="num-btn" onclick="pressPin('8')">8</button>

        </div>

</div>
    
    <div class="header">
        <div class="logo-text-container" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
    <div class="main-logo-text">EJ TOBACCO</div>
    <div class="sub-logo-text">DELIVERY</div>
</div>

        <div id="statusKoneksi" style="display: flex; align-items: center; gap: 5px; justify-content: flex-end; margin-top: 5px;">
    <div id="lampuKoneksi" style="width: 8px; height: 8px; background: var(--safe); border-radius: 50%; box-shadow: 0 0 10px var(--safe);"></div>
    <span id="teksKoneksi" style="font-size: 9px; font-weight: 800; color: var(--safe); letter-spacing: 1px;">SISTEM ONLINE</span>
</div>
        
        <div style="text-align: right;">
            <div id="runningClock" style="font-size: 14px; font-weight: 800; color: var(--safe);">00:00:00</div>
            <div id="currentDay" style="font-size: 9px; color: var(--gold); font-weight: 800;">TGL LOADING...</div>
        </div>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 15px;">
        <input type="date" id="datePicker" onchange="changeDate()" style="border-color: var(--gold); background: rgba(212, 175, 55, 0.1); color: var(--gold); text-align: center; font-weight: 800; flex: 1;">
        <button onclick="goToToday()" style="background: var(--gold); border: none; border-radius: 12px; padding: 0 15px; font-weight: 800; font-size: 10px; color: black; cursor: pointer;">HARI INI</button>
    </div>

    <div style="padding: 5px 0 15px 0;">
    <button onclick="bukaLaporan()" style="background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); color: var(--gold); padding: 16px; border-radius: 20px; font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
        <span style="font-size: 18px;">📊</span> LIHAT REKAPITULASI BULANAN
    </button>
</div>

    <div style="padding: 0 0 15px 0;">
    <button onclick="bukaRadar()" style="background: rgba(37, 99, 235, 0.1); border: 1px solid var(--blue); color: var(--blue); padding: 16px; border-radius: 20px; font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; letter-spacing: 1px;">
        <span style="font-size: 18px;">📡</span> BUKA RADAR SEBARAN PELANGGAN
    </button>
</div>
    
    <div class="report-grid">
    <div class="report-box" id="f-Gudang" onclick="setFilter('Gudang')" style="border-color: var(--blue);">
        <span>Gudang</span><b id="countGudang">0</b>
    </div>
    
    <div class="report-box active" id="f-Semua" onclick="setFilter('Semua')"><span>Sisa</span><b id="countProses">0</b></div>
    <div class="report-box" id="f-Terkirim" onclick="setFilter('Terkirim')" style="border-color: var(--safe);"><span>Sukses</span><b id="countSukses">0</b></div>
</div>

    <div class="report-box" style="margin-bottom: 20px; border-color: var(--safe); background: rgba(34, 197, 94, 0.05); cursor: default;">
        <span style="color: var(--safe); font-size: 10px; font-weight: 800;">TOTAL SALDO DI KURIR</span>
        <b id="dailyTunai" style="font-size: 20px; color: var(--safe);">Rp0</b>
    </div>

    <div class="glass-card">
    <input type="text" id="noPesanan" placeholder="No Pesanan (#001)" autocomplete="off">
    <input type="text" id="pembeli" placeholder="Nama Pembeli" autocomplete="off">
    <input type="text" id="nohp" placeholder="WhatsApp (08xx)" autocomplete="off">
    <textarea id="alamat" placeholder="Alamat Lengkap" autocomplete="off"></textarea>
    <input type="text" id="mapLink" placeholder="Link Google Maps (Opsional)" autocomplete="off">
    
    <select id="metodeBayar" onchange="toggleTotal()">
        <option value="COD">Metode: COD</option>
        <option value="Transfer">Metode: Transfer</option>
    </select>

    <input type="number" id="total" placeholder="Harga COD (Rp)" autocomplete="off" inputmode="numeric">

        <label style="color: var(--danger); font-size: 11px; font-weight: 800; display: flex; align-items: center; gap: 8px; margin-bottom: 15px; background: rgba(239, 68, 68, 0.05); padding: 10px; border-radius: 10px; border: 1px dashed var(--danger); cursor: pointer;">
    <input type="checkbox" id="isUrgent" style="width: 18px; height: 18px; accent-color: var(--danger);"> 
    🔥 TANDAI SEBAGAI PESANAN URGENT
</label>

<button class="btn-main" onclick="tambah()">SIMPAN & PRINT</button>
    
</div>

    <div class="glass-card">
        <input type="number" id="jumlahSetoran" placeholder="Input Setoran (Rp)">
        <button class="btn-main" style="background:var(--safe); color:white" onclick="setor()">TERIMA SETORAN</button>
    </div>

    <input type="text" id="searchBar" placeholder="🔍 Cari nama/resi..." oninput="renderList()" style="width:100%; padding:12px; border-radius:12px; background:var(--glass); border:1px solid var(--gold); color:white; margin-bottom:15px; outline:none;">
    
    <div id="adminList" class="glass-card">Memuat data...</div>

    <div id="modalFoto" class="modal-foto" style="display: none;" onclick="this.style.display='none'">
    <img id="imgBukti" src="">
    <p style="color:var(--gold); margin-top:15px; font-weight:800; font-size:12px; letter-spacing: 1px;">KLIK MANA SAJA UNTUK TUTUP</p>
</div>


    <div id="waPrompt">
        <p id="waText" style="font-size:12px; margin-bottom:10px;">✅ Data Tersimpan!</p>
        <button id="btnWAOpen" style="background:white; color:black; border:none; padding:10px 20px; border-radius:10px; font-weight:800; width:100%;">KIRIM WA SEKARANG</button>
        <p onclick="document.getElementById('waPrompt').style.display='none'" style="margin-top:10px; font-size:10px; opacity:0.7; cursor:pointer;">Nanti Saja</p>
    </div>

    <div id="receipt-print"><div id="receipt-content"></div></div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
    const firebaseConfig = { apiKey: "AIzaSyAVQGysGRlYJ2b4PekM3vaXKtx6UFvNlCk", databaseURL: "https://ej-tobacco-express-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let allOrders = [], totalSetoranGlobal = 0, currentFilter = "Semua", lastOrder = null, lastDateString = "";

    function formatTglDB(date) { const d = new Date(date); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
    function initDate() { const n = new Date(); document.getElementById('datePicker').value = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; lastDateString = formatTglDB(n); }
    initDate();

    function changeDate() { updateAll(); }
    function goToToday() { initDate(); updateAll(); }
    function setFilter(f) { currentFilter = f; document.querySelectorAll('.report-box').forEach(el => el.classList.remove('active')); document.getElementById('f-'+f).classList.add('active'); renderList(); }

    function startClock() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('runningClock').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('currentDay').innerText = now.toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'}).toUpperCase();
            if (formatTglDB(now) !== lastDateString) { lastDateString = formatTglDB(now); initDate(); updateAll(); }
        }, 1000);
    }

    // LISTENER DATA
    db.ref('pesanan').limitToLast(500).on('value', snap => {
        const val = snap.val();
        allOrders = val ? Object.keys(val).map(k => ({id:k, ...val[k]})).reverse() : [];
        db.ref('setoran').on('value', sSnap => {
            totalSetoranGlobal = Object.values(sSnap.val() || {}).reduce((a, b) => a + b, 0);
            updateAll();
        });
    });

    function updateAll() {
        const pickerVal = document.getElementById('datePicker').value;
        if(!pickerVal) return;
        const p = pickerVal.split('-');
        const tglTarget = `${p[2]}/${p[1]}/${p[0]}`;
        updateDashboard(tglTarget);
        renderList();
    }

    function updateDashboard(tglTarget) {
        let s=0, g=0, p=0, gd=0, codSukses=0;
        allOrders.forEach(o => {
            if (o.status === 'Gudang') gd++;
            if (o.status !== 'Terkirim' && o.status !== 'Gagal' && o.status !== 'Gudang') p++;
            if (o.tanggal === tglTarget) {
                if (o.status === 'Terkirim') s++;
                else if (o.status === 'Gagal') g++;
            }
            if (o.status === 'Terkirim' && o.metode === 'COD') codSukses += Number(o.total || 0);
        });
        document.getElementById('countGudang').innerText = gd;
        document.getElementById('countProses').innerText = p;
        document.getElementById('countSukses').innerText = s;
        document.getElementById('countGagal').innerText = g;
        document.getElementById('dailyTunai').innerText = "Rp" + (codSukses - totalSetoranGlobal).toLocaleString();
    }

    function renderList() {
        const keyword = document.getElementById('searchBar').value.toLowerCase();
        const pickerVal = document.getElementById('datePicker').value;
        const p = pickerVal.split('-');
        const tglAktif = `${p[2]}/${p[1]}/${p[0]}`;
        let html = "";
        
        const filtered = allOrders.filter(o => {
            const matchSearch = (o.namaPembeli || "").toLowerCase().includes(keyword) || (o.noPesanan || "").toLowerCase().includes(keyword);
            let matchStatus;
            if (currentFilter === "Semua") matchStatus = (o.status !== 'Terkirim' && o.status !== 'Gagal' && o.status !== 'Gudang');
            else if (currentFilter === "Gudang") matchStatus = (o.status === 'Gudang');
            else matchStatus = (o.status === currentFilter && o.tanggal === tglAktif);
            return matchSearch && matchStatus;
        });

        if(filtered.length === 0) {
            html = `<p style="text-align:center; opacity:0.5; padding:20px;">Data tidak ditemukan.</p>`;
        } else {
            filtered.forEach(o => {
                const waNum = String(o.nohp || "").replace(/\D/g, '').replace(/^0/, '62');
                html += `<div class="order-item">
                    <span style="font-size:9px; color:var(--gold)">${o.tanggal} | ${o.waktu}</span><br>
                    <b>${o.noPesanan} - ${o.namaPembeli}</b><br>
                    <small>${o.status} | ${o.metode} | Rp${Number(o.total).toLocaleString()}</small>
                    ${o.catatanKurir ? `<div style="font-size:11px; color:var(--safe); margin-top:5px; font-style:italic;">📝 Bukti: ${o.catatanKurir}</div>` : ''}
                    ${o.alasanTunda ? `<div style="font-size:11px; color:var(--danger); margin-top:5px;">⚠️ Alasan: ${o.alasanTunda}</div>` : ''}
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:8px;">
                        <a href="https://wa.me/${waNum}" style="background:var(--wa); text-decoration:none; color:white; padding:8px; border-radius:8px; text-align:center; font-size:10px; font-weight:800;">WA</a>
                        <button style="background:var(--gold); color:black; border:none; padding:8px; border-radius:8px; font-size:10px; font-weight:800;" onclick="reprint('${o.id}')">REPRINT</button>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:5px;">
                        ${o.buktiFoto ? `<button class="btn-small" style="background:var(--safe);" onclick="viewFoto('${o.buktiFoto}')">LIHAT FOTO</button>` : `<div style="background:var(--glass); color:gray; padding:8px; border-radius:8px; text-align:center; font-size:10px; border:1px solid rgba(255,255,255,0.05);">TANPA FOTO</div>`}
                        ${o.status === 'Terkirim' ? `<div style="background:rgba(255,255,255,0.05); color:#666; padding:10px; border-radius:10px; text-align:center; font-size:10px; font-weight:800; border:1px solid rgba(255,255,255,0.1); cursor:not-allowed;">🔒 TERKUNCI</div>` : (o.status === 'Gagal' ? `<button onclick="kirimUlang('${o.id}')" style="background:var(--blue); color:white; border:none; padding:10px; border-radius:10px; font-size:10px; font-weight:800;">KIRIM ULANG</button>` : `<button onclick="hapus('${o.id}')" style="background:rgba(239,68,68,0.1); color:#EF4444; border:1px solid #EF4444; padding:10px; border-radius:10px; font-size:10px; font-weight:800;">HAPUS</button>`)}
                    </div>
                </div>`;
            });
        }
        document.getElementById('adminList').innerHTML = html;
    }

    // FUNGSI LAINNYA TETAP SAMA (tambah, reprint, setor, viewFoto, dll)
    function viewFoto(src) { document.getElementById('modalFoto').style.display = 'flex'; document.getElementById('imgBukti').src = src; }
    function toggleTotal() { document.getElementById('total').style.display = document.getElementById('metodeBayar').value === 'Transfer' ? 'none' : 'block'; }
    function tambah() { /* ... kode tambah Bos ... */ }
    function reprint(id) { lastOrder = allOrders.find(o => o.id === id); if(lastOrder) executePrint(); }
    function setor() { /* ... kode setor Bos ... */ }
