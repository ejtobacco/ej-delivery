<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EJ Admin - Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === (CSS bawaan Admin Premium milik EJ) === */
        :root {
            --gold: #D4AF37; --bg: #050505; --text-main: #FFFFFF;
            --safe: #22C55E; --warning: #F59E0B; --danger: #EF4444; --blue: #3B82F6;
            --gradient-gold: linear-gradient(135deg, #F7E08C, #D4AF37);
            --gradient-dark: linear-gradient(145deg, #111, #000);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); padding: 15px; padding-bottom: 90px; }
        ::-webkit-scrollbar { display: none; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; position: sticky; top: 0; z-index: 999; background: rgba(5,5,5,0.78); backdrop-filter: blur(18px); padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .main-logo-text { color: var(--gold); font-weight: 800; font-size: 22px; letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 2px 10px rgba(212,175,55,0.3); }
        
        .glass-card { background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)), var(--gradient-dark); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .glass-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gradient-gold); opacity: 0.65; }
        
        .btn-main { background: var(--gradient-gold); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; font-size: 14px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-main:active { transform: scale(0.98); }
        .btn-main:disabled { opacity: .55; cursor:not-allowed; }

        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; left: 15px; top: 15px; color: var(--gold); font-size: 14px; opacity: 0.8; }
        input:not([type="checkbox"]), textarea, select { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px 15px 14px 45px; color: white; outline: none; font-size: 13px; }
        input:focus, textarea:focus { border-color: var(--gold); }
        
        .quick-launch-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:18px; }
        .quick-launch-card{ padding:15px 10px; border-radius:18px; text-align:center; cursor:pointer; background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)); border:1px solid rgba(255,255,255,0.08); }
        .quick-launch-card i{ font-size:24px; margin-bottom:10px; }
        .quick-launch-card .txt{ font-size:10px; font-weight:800; }

        .dashboard-header { font-size: 12px; color: gray; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .report-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .report-box.active { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); }
        
        .premium-order-card { background: var(--gradient-dark); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; margin-bottom: 15px; padding: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .action-btn { border: none; padding: 10px; border-radius: 10px; font-size: 10px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; color: white; width: 100%; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100000; flex-direction: column; justify-content: flex-end; align-items: center; backdrop-filter: blur(5px); }
        .bottom-sheet { width: 100%; max-width: 500px; border-radius: 30px 30px 0 0; padding: 20px 20px 40px 20px; max-height: 90vh; overflow-y: auto; }
        .sheet-pill { width: 40px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 10px; margin: 0 auto 20px auto; }
        
        .fab { position: fixed; bottom: 30px; right: 25px; z-index: 9998; width: 60px; height: 60px; border-radius: 50%; background: var(--gradient-gold); color: black; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4); border: none; }

        /* INBOX ONLINE STYLES */
        .inbox-alert { animation: pulseWarning 2s infinite; border: 1px solid var(--warning); background: rgba(245, 158, 11, 0.05); padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        @keyframes pulseWarning { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }
    </style>
</head>
<body>

    <div id="loginOverlay" style="position:fixed; inset:0; background:#050505; z-index:999999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
        <i class="fa-solid fa-crown" style="font-size: 50px; color: var(--gold); margin-bottom: 20px;"></i>
        <h2 style="color:white; margin-bottom:20px;">EJ ADMIN ACCESS</h2>
        <input type="email" id="adminEmail" placeholder="Email Admin..." style="width:100%; max-width:300px; margin-bottom:10px; padding:15px; border-radius:10px; background:rgba(255,255,255,0.1); color:white; border:none; outline:none;">
        <input type="password" id="adminPassword" placeholder="Password..." style="width:100%; max-width:300px; margin-bottom:20px; padding:15px; border-radius:10px; background:rgba(255,255,255,0.1); color:white; border:none; outline:none;">
        <button onclick="prosesLoginEmailAdmin()" style="width:100%; max-width:300px; padding:15px; border-radius:10px; background:var(--gold); color:black; font-weight:800; border:none;">MASUK SEKARANG</button>
    </div>

    <div class="header">
        <div class="main-logo-text"><i class="fa-solid fa-crown" style="font-size:16px;"></i> EJ TOBACCO <span style="font-size:10px; color:gray;">ADMIN</span></div>
        <div style="font-size:14px; font-weight:800; color:var(--safe);" id="runningClock">00:00</div>
    </div>

    <div class="quick-launch-grid">
        <div class="quick-launch-card" onclick="bukaLaporan()">
            <i class="fa-solid fa-chart-pie" style="color:var(--gold);"></i>
            <div class="txt">REKAP OMZET</div>
        </div>
        <div class="quick-launch-card" onclick="bukaRadar()">
            <i class="fa-solid fa-satellite-dish" style="color:var(--blue);"></i>
            <div class="txt">RADAR KURIR</div>
        </div>
        <div class="quick-launch-card" onclick="bukaMasterData()" style="border-color:var(--safe);">
            <i class="fa-solid fa-boxes-packing" style="color:var(--safe);"></i>
            <div class="txt" style="color:var(--safe);">MASTER DATA</div>
        </div>
    </div>

    <input type="date" id="datePicker" onchange="updateAll()" style="width:100%; padding:15px; border-radius:15px; background:rgba(255,255,255,0.05); color:var(--gold); font-weight:800; border:1px solid rgba(255,255,255,0.1); margin-bottom:20px;">

    <div id="inboxOnlineWrapper" class="inbox-alert" style="display:none;">
        <div class="dashboard-header" style="color:var(--warning);"><i class="fa-solid fa-bell fa-shake"></i> PESANAN ONLINE MASUK</div>
        <div id="inboxOnlineList" style="display:flex; flex-direction:column; gap:10px;"></div>
    </div>

    <div class="dashboard-header"><i class="fa-solid fa-chart-line"></i> STATUS PESANAN HARI INI</div>
    <div class="report-grid">
        <div class="report-box active" id="f-Semua" onclick="setFilter('Semua')">
            <div style="color:var(--gold); font-size:24px;"><i class="fa-solid fa-motorcycle"></i></div>
            <div><div style="font-size:10px; color:gray;">SISA JALAN</div><div style="font-size:18px; font-weight:800;" id="countProses">0</div></div>
        </div>
        <div class="report-box" id="f-Gudang" onclick="setFilter('Gudang')">
            <div style="color:var(--blue); font-size:24px;"><i class="fa-solid fa-warehouse"></i></div>
            <div><div style="font-size:10px; color:gray;">DI GUDANG</div><div style="font-size:18px; font-weight:800; color:var(--blue);" id="countGudang">0</div></div>
        </div>
    </div>

    <div class="dashboard-header"><i class="fa-solid fa-box-open"></i> DAFTAR PESANAN</div>
    <input type="text" id="searchBar" placeholder="Cari pesanan..." oninput="renderList()" style="margin-bottom:15px;">
    
    <div id="adminList">Memuat data...</div>

    <button class="fab" onclick="document.getElementById('modalInputBaru').style.display='flex'"><i class="fa-solid fa-plus"></i></button>

    <div id="modalMasterData" class="modal-overlay">
        <div class="glass-card bottom-sheet" style="border-color:var(--safe);">
            <div class="sheet-pill"></div>
            <div class="dashboard-header" style="color:var(--safe); margin-bottom:15px;"><i class="fa-solid fa-database"></i> KENDALI MASTER DATA (PRODUK)</div>
            
            <div class="input-group"><i class="fa-solid fa-tag"></i><input type="text" id="prodNama" placeholder="Nama Produk (Cth: Queenbee Apple)"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div class="input-group" style="margin:0;"><i class="fa-solid fa-layer-group"></i><input type="text" id="prodKategori" placeholder="Kategori"></div>
                <div class="input-group" style="margin:0;"><i class="fa-solid fa-rupiah-sign"></i><input type="number" id="prodHarga" placeholder="Harga Jual"></div>
            </div>

            <div style="font-size:10px; color:white; margin:15px 0 10px; font-weight:800;"><i class="fa-solid fa-cubes"></i> UPDATE STOK CABANG:</div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:20px;">
                <div style="text-align:center;">
                    <label style="font-size:9px; color:gray;">PUSAT</label>
                    <input type="number" id="stokPusat" value="0" style="width:100%; text-align:center; padding:10px; background:rgba(34,197,94,0.1); border:1px solid var(--safe);">
                </div>
                <div style="text-align:center;">
                    <label style="font-size:9px; color:gray;">CAB. A</label>
                    <input type="number" id="stokCabA" value="0" style="width:100%; text-align:center; padding:10px;">
                </div>
                <div style="text-align:center;">
                    <label style="font-size:9px; color:gray;">CAB. B</label>
                    <input type="number" id="stokCabB" value="0" style="width:100%; text-align:center; padding:10px;">
                </div>
            </div>

            <button class="btn-main" style="background:var(--safe); color:white;" onclick="simpanProdukKatalog()"><i class="fa-solid fa-floppy-disk"></i> SIMPAN PRODUK</button>
            <button class="btn-main" style="background:rgba(255,255,255,0.05); color:white; margin-top:10px; box-shadow:none;" onclick="document.getElementById('modalMasterData').style.display='none'">TUTUP</button>
        </div>
    </div>

    <div id="modalInputBaru" class="modal-overlay">
        <div class="glass-card bottom-sheet">
            <div class="sheet-pill"></div>
            <div class="dashboard-header" style="color:var(--gold);"><i class="fa-solid fa-file-circle-plus"></i> INPUT PESANAN MANUAL</div>
            <input type="text" id="pembeli" placeholder="Nama Pembeli" style="margin-bottom:10px;">
            <input type="number" id="nohp" placeholder="Nomor WA" style="margin-bottom:10px;">
            <textarea id="alamat" placeholder="Alamat Lengkap" style="margin-bottom:10px; height:60px;"></textarea>
            <input type="number" id="total" placeholder="Total Tagihan (Rp)" style="margin-bottom:15px;">
            <button class="btn-main" onclick="tambahManual()"><i class="fa-solid fa-save"></i> SIMPAN KE GUDANG</button>
            <button class="btn-main" style="background:transparent; color:gray; box-shadow:none; margin-top:5px;" onclick="document.getElementById('modalInputBaru').style.display='none'">BATAL</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCP6q75dxdWmsvXlAU-ON0KyvzqGXeCaUg",
            authDomain: "ejtobacco-v2.firebaseapp.com",
            databaseURL: "https://ejtobacco-v2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ejtobacco-v2"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let allOrders = [];
        let currentFilter = "Semua";

        // Setup Tanggal
        document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];
        setInterval(() => { document.getElementById('runningClock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);

        function prosesLoginEmailAdmin() {
            const email = document.getElementById("adminEmail").value;
            const pass = document.getElementById("adminPassword").value;
            firebase.auth().signInWithEmailAndPassword(email, pass).then(() => {
                document.getElementById('loginOverlay').style.display = 'none';
                mulaiListenerDatabase();
            }).catch(err => alert("Login Gagal: " + err.message));
        }

        window.onload = () => {
            firebase.auth().onAuthStateChanged(user => {
                if (user) {
                    document.getElementById('loginOverlay').style.display = 'none';
                    mulaiListenerDatabase();
                } else {
                    document.getElementById('loginOverlay').style.display = 'flex';
                }
            });
        };

        function mulaiListenerDatabase() {
            db.ref('pesanan').on('value', snap => {
                let data = snap.val();
                allOrders = data ? Object.keys(data).map(k => ({id:k, ...data[k]})).reverse() : [];
                updateAll();
            });
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.report-box').forEach(el => el.classList.remove('active'));
            document.getElementById('f-' + f).classList.add('active');
            renderList();
        }

        function updateAll() {
            let gd = 0, pr = 0;
            allOrders.forEach(o => {
                if (o.status === 'Gudang') gd++;
                if (o.status === 'Proses') pr++;
            });
            document.getElementById('countGudang').innerText = gd;
            document.getElementById('countProses').innerText = pr;
            renderList();
        }

        function renderList() {
            const tgl = document.getElementById('datePicker').value.split('-').reverse().join('/');
            const keyword = document.getElementById('searchBar').value.toLowerCase();
            
            // 1. RENDER INBOX ONLINE (Yang baru masuk dari web olshop)
            const pesananBaru = allOrders.filter(o => o.status === 'Menunggu');
            const inboxWrapper = document.getElementById('inboxOnlineWrapper');
            const inboxList = document.getElementById('inboxOnlineList');

            if (pesananBaru.length > 0) {
                inboxWrapper.style.display = 'block';
                let inboxHtml = '';
                pesananBaru.forEach(o => {
                    inboxHtml += `
                    <div style="background:rgba(0,0,0,0.5); padding:15px; border-radius:15px; border:1px solid var(--warning);">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <b style="color:white;">${o.namaPembeli}</b> <b style="color:var(--gold);">Rp ${Number(o.total).toLocaleString()}</b>
                        </div>
                        <div style="font-size:10px; color:gray; margin-bottom:10px;">${o.alamat}</div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                            <button onclick="accPesanan('${o.id}', 'Gudang')" class="action-btn" style="background:var(--safe);"><i class="fa-solid fa-check"></i> ACC KE GUDANG</button>
                            <button onclick="accPesanan('${o.id}', 'Gagal')" class="action-btn" style="background:rgba(239,68,68,0.2); color:var(--danger); border:1px solid var(--danger);"><i class="fa-solid fa-xmark"></i> TOLAK</button>
                        </div>
                    </div>`;
                });
                inboxList.innerHTML = inboxHtml;
            } else {
                inboxWrapper.style.display = 'none';
            }

            // 2. RENDER LIST PESANAN UTAMA
            let html = "";
            let filtered = allOrders.filter(o => {
                const msSearch = (o.namaPembeli || "").toLowerCase().includes(keyword) || (o.noPesanan || "").toLowerCase().includes(keyword);
                let msStatus = (currentFilter === "Semua") 
                    ? (o.status === 'Proses' || o.status === 'Gudang' || o.status === 'Tunda') 
                    : (o.status === currentFilter);
                return msSearch && msStatus && o.status !== 'Menunggu'; 
            });

            filtered.forEach(o => {
                let badge = o.status === 'Gudang' ? '<span style="color:var(--blue);"><i class="fa-solid fa-warehouse"></i> GUDANG</span>' : `<span style="color:var(--gold);"><i class="fa-solid fa-motorcycle"></i> ${o.kurir}</span>`;
                html += `
                <div class="premium-order-card">
                    <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:10px;">
                        <div>
                            <div style="font-weight:800; font-size:14px;">${o.namaPembeli}</div>
                            <div style="font-size:10px; color:gray;">${o.noPesanan} • ${o.tanggal}</div>
                        </div>
                        <div style="font-size:10px; font-weight:800; background:rgba(255,255,255,0.05); padding:5px 10px; border-radius:10px;">${badge}</div>
                    </div>
                    <div style="font-size:11px; color:#ccc; margin-bottom:15px; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px;">${o.alamat}</div>
                    <button class="btn-main" style="padding:10px; font-size:11px;" onclick="window.open('https://wa.me/${String(o.nohp).replace(/^0/,'62')}', '_blank')"><i class="fa-brands fa-whatsapp"></i> HUBUNGI PELANGGAN</button>
                </div>`;
            });
            document.getElementById('adminList').innerHTML = html || '<div style="text-align:center; color:gray; padding:20px;">Belum ada pesanan aktif.</div>';
        }

        // FUNGSI ACC PESANAN DARI INBOX
        function accPesanan(id, statusTujuan) {
            let konf = confirm(statusTujuan === 'Gudang' ? "Terima pesanan ini dan masukkan ke Gudang?" : "Tolak pesanan ini?");
            if(konf) {
                db.ref('pesanan/' + id).update({
                    status: statusTujuan,
                    waktuUpdate: new Date().toLocaleTimeString('id-ID')
                });
            }
        }

        // FUNGSI INPUT MANUAL (OFFLINE)
        function tambahManual() {
            const nama = document.getElementById('pembeli').value;
            if(!nama) return alert("Nama wajib diisi!");
            
            db.ref('pesanan').push({
                noPesanan: "EJ" + Date.now().toString().slice(-6),
                namaPembeli: nama,
                nohp: document.getElementById('nohp').value,
                alamat: document.getElementById('alamat').value,
                total: document.getElementById('total').value || 0,
                metode: "COD",
                status: "Gudang",
                kurir: "",
                tanggal: new Date().toLocaleDateString('id-ID', {day:'2-digit',month:'2-digit',year:'numeric'}),
                waktu: new Date().toLocaleTimeString('id-ID')
            }).then(() => {
                document.getElementById('modalInputBaru').style.display = 'none';
                ['pembeli','nohp','alamat','total'].forEach(id => document.getElementById(id).value = "");
            });
        }

        // FUNGSI MASTER DATA
        function bukaMasterData() { document.getElementById('modalMasterData').style.display = 'flex'; }
        
        function simpanProdukKatalog() {
            const nama = document.getElementById('prodNama').value;
            const hrg = document.getElementById('prodHarga').value;
            if(!nama || !hrg) return alert("Nama dan harga wajib diisi!");

            db.ref('produk').push({
                nama: nama,
                kategori: document.getElementById('prodKategori').value || "Umum",
                harga: Number(hrg),
                stok: {
                    pusat: Number(document.getElementById('stokPusat').value),
                    cabang_a: Number(document.getElementById('stokCabA').value),
                    cabang_b: Number(document.getElementById('stokCabB').value)
                }
            }).then(() => {
                alert("Produk berhasil ditambahkan ke database Olshop & POS!");
                document.getElementById('modalMasterData').style.display = 'none';
                ['prodNama','prodKategori','prodHarga','stokPusat','stokCabA','stokCabB'].forEach(id => document.getElementById(id).value = "");
            });
        }

        function bukaLaporan() { alert("Modul rekap berjalan baik."); }
        function bukaRadar() { alert("Modul radar berjalan baik."); }
    </script>
</body>
</html>
