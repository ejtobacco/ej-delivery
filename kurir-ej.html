<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ DELIVERY - KURIR PRO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2); --text-main: #FFFFFF; --safe: #22C55E; --danger: #EF4444; --warning: #FACC15; --blue: #2563eb; --wa: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 15px; padding-bottom: 80px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo-text { color: var(--gold); font-weight: 800; font-size: 18px; letter-spacing: 1px; }

        .tab-menu { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tab-btn { background: var(--glass); border: 1px solid var(--glass-border); padding: 10px; border-radius: 12px; color: white; font-weight: 800; font-size: 11px; text-align: center; cursor: pointer; }
        .tab-btn.active { background: rgba(212, 175, 55, 0.2); border-color: var(--gold); color: var(--gold); }

        .search-box { width: 100%; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white; margin-bottom: 15px; outline: none; }

        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 18px; margin-bottom: 15px; position: relative; }
        .status-badge { position: absolute; top: 0; right: 0; padding: 5px 12px; font-size: 9px; font-weight: 800; border-radius: 0 0 0 12px; text-transform: uppercase; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: 800; font-size: 12px; cursor: pointer; color: white; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .btn-success { background: var(--safe); }
        .btn-warning { background: var(--warning); color: black; }
        .btn-danger { background: var(--danger); }
        .btn-wa { background: var(--wa); width: 100%; margin-top: 15px; }
        .btn-maps { background: var(--blue); width: 100%; margin-top: 8px; }

        .empty-state { text-align: center; padding: 40px; opacity: 0.5; font-size: 13px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        .modal img { max-width: 90%; border-radius: 10px; border: 2px solid var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">EJ DELIVERY <span style="font-weight:400; font-size:12px; color:white;">| KURIR</span></div>
        <div id="clock" style="font-size: 12px; font-weight: 800; color: var(--gold);">00:00:00</div>
    </div>

    <input type="text" id="searchOrder" class="search-box" placeholder="🔍 Cari nama pembeli..." oninput="renderOrders()">

    <div class="tab-menu">
        <div class="tab-btn active" id="t-Proses" onclick="setTab('Proses')">PROSES</div>
        <div class="tab-btn" id="t-Terkirim" onclick="setTab('Terkirim')">SUKSES</div>
        <div class="tab-btn" id="t-Gagal" onclick="setTab('Gagal')">CANCEL</div>
    </div>

    <div id="orderContainer">
        <div class="empty-state">Memuat data pengiriman...</div>
    </div>

    <div id="modalView" class="modal" onclick="this.style.display='none'">
        <img id="imgPreview" src="">
        <p style="color:white; margin-top:10px; font-size:12px;">KLIK UNTUK TUTUP</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVQGysGRlYJ2b4PekM3vaXKtx6UFvNlCk", databaseURL: "https://ej-tobacco-express-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentTab = 'Proses';
        let allData = [];

        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t-' + tab).classList.add('active');
            renderOrders();
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
        }
        setInterval(updateClock, 1000);

        db.ref('pesanan').on('value', snap => {
            const val = snap.val();
            allData = val ? Object.keys(val).map(k => ({id:k, ...val[k]})).reverse() : [];
            renderOrders();
        });

        function renderOrders() {
            const container = document.getElementById('orderContainer');
            const search = document.getElementById('searchOrder').value.toLowerCase();
            container.innerHTML = "";

            const filtered = allData.filter(o => {
                const matchSearch = (o.namaPembeli || "").toLowerCase().includes(search);
                if (currentTab === 'Proses') return matchSearch && (o.status !== 'Terkirim' && o.status !== 'Gagal');
                return matchSearch && (o.status === currentTab);
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state">Tidak ada data di tab ini.</div>`;
                return;
            }

            filtered.forEach(o => {
                const badgeColor = o.status === 'Terkirim' ? 'var(--safe)' : (o.status === 'Gagal' ? 'var(--danger)' : 'var(--gold)');
                let alasanHtml = o.alasanTunda ? `<div style="background:rgba(250,204,21,0.1); color:var(--warning); padding:8px; border-radius:8px; font-size:11px; margin-top:10px; border-left:3px solid var(--warning);"><b>KENDALA:</b> ${o.alasanTunda}</div>` : "";
                
                // Konversi nomor WA
                const waNum = String(o.nohp || "").replace(/\D/g, '').replace(/^0/, '62');
                const teksWA = encodeURIComponent(`Halo Kak ${o.namaPembeli},\nSaya Kurir dari *EJ TOBACCO*. Ingin mengantar pesanan paket Kakak.\n\nApakah sedang ada di tempat?`);
                
                let actionButtons = "";
                if (o.status !== 'Terkirim' && o.status !== 'Gagal') {
                    actionButtons = `
                        <a href="https://wa.me/${waNum}?text=${teksWA}" class="btn btn-wa">💬 HUBUNGI PEMBELI (WA)</a>
                        <div class="btn-group">
                            <button class="btn btn-success" onclick="updateStatus('${o.id}', 'Terkirim')">✅ SELESAI</button>
                            <button class="btn btn-warning" onclick="updateStatus('${o.id}', 'Tunda')">⚠️ TUNDA</button>
                        </div>
                        <button class="btn btn-danger" style="width:100%; margin-top:8px;" onclick="updateStatus('${o.id}', 'Gagal')">❌ CANCEL ORDER</button>
                    `;
                } else if (o.buktiFoto) {
                    actionButtons = `<button class="btn" style="background:var(--glass); border:1px solid var(--safe); color:var(--safe); width:100%; margin-top:10px;" onclick="previewFoto('${o.buktiFoto}')">👁️ LIHAT BUKTI FOTO</button>`;
                }

                container.innerHTML += `
                    <div class="glass-card">
                        <div class="status-badge" style="background:${badgeColor}">${o.status}</div>
                        <span style="font-size:10px; color:var(--gold); font-weight:800;">${o.noPesanan}</span>
                        <h3 style="margin-top:5px; font-size:18px;">${o.namaPembeli}</h3>
                        <p style="font-size:12px; margin-top:5px; opacity:0.7;">📍 ${o.alamat}</p>
                        <div style="margin-top:10px; font-weight:800; color:var(--safe);">TAGIHAN: Rp${Number(o.total).toLocaleString()} (${o.metode})</div>
                        ${alasanHtml}
                        ${o.mapLink ? `<a href="${o.mapLink}" class="btn btn-maps" target="_blank">📍 PENUNJUK JALAN (MAPS)</a>` : ''}
                        ${actionButtons}
                        <input type="file" id="file-${o.id}" accept="image/*" capture="camera" style="display:none;" onchange="doUpload('${o.id}', this)">
                    </div>
                `;
            });
        }

        function updateStatus(id, stat) {
            if (stat === 'Terkirim') {
                if(confirm("Ambil foto bukti paket diterima?")) {
                    document.getElementById('file-' + id).click();
                }
            } else if (stat === 'Tunda' || stat === 'Gagal') {
                const msg = stat === 'Tunda' ? "Alasan Tunda (Rumah Kosong/HP Mati):" : "Alasan Cancel:";
                const alasan = prompt(msg);
                if (alasan) {
                    db.ref('pesanan/' + id).update({ 
                        status: stat, 
                        alasanTunda: alasan,
                        waktuUpdate: new Date().toLocaleTimeString()
                    });
                }
            }
        }

        function doUpload(id, input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                db.ref('pesanan/' + id).update({
                    status: 'Terkirim',
                    buktiFoto: e.target.result,
                    alasanTunda: null,
                    waktuSelesai: new Date().toLocaleTimeString()
                }).then(() => alert("Laporan Terkirim!"));
            };
            reader.readAsDataURL(file);
        }

        function previewFoto(src) {
            document.getElementById('imgPreview').src = src;
            document.getElementById('modalView').style.display = 'flex';
        }
    </script>
</body>
</html>
