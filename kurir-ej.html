<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ DELIVERY - KURIR</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="icon" href="https://api.iconify.design/material-symbols:delivery-dining-rounded.svg?color=%23D4AF37">
    <link rel="apple-touch-icon" href="https://api.iconify.design/material-symbols:delivery-dining-rounded.svg?color=%23D4AF37">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2); --text-main: #FFFFFF; --safe: #22C55E; --danger: #EF4444; --blue: #2563eb; --wa: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .stat-box { text-align: center; padding: 10px; background: var(--glass); border-radius: 12px; border: 1px solid var(--glass-border); cursor: pointer; transition: 0.3s; }
        .stat-box.active { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); }
        .stat-box span { font-size: 7px; color: var(--gold); display: block; }
        .stat-box b { font-size: 14px; }
        .order-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--gold); position: relative; }
        .date-tag { position: absolute; top: 12px; right: 18px; font-size: 8px; color: var(--gold); opacity: 0.6; font-weight: 800; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn { border: none; padding: 12px; border-radius: 12px; font-weight: 800; font-size: 10px; cursor: pointer; color: white; text-align: center; text-decoration: none; text-transform: uppercase; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 12px; background: var(--glass); border: 1px solid var(--gold); color: white; margin-bottom: 15px; outline: none; }
        #cameraInput { display: none; }
    </style>
</head>
<body>

    <h2 style="color:var(--gold); text-align:center; margin-bottom:15px; letter-spacing:2px;">KURIR EJ</h2>

    <div class="stat-grid">
        <div class="stat-box active" id="f-Sisa" onclick="setFilter('Sisa')"><span>Sisa (Total)</span><b id="countProses">0</b></div>
        <div class="stat-box" id="f-Terkirim" onclick="setFilter('Terkirim')" style="border-color: var(--safe);"><span>Sukses Hari Ini</span><b id="countSukses">0</b></div>
        <div class="stat-box" id="f-Gagal" onclick="setFilter('Gagal')" style="border-color: var(--danger);"><span>Gagal Hari Ini</span><b id="countGagal">0</b></div>
    </div>

    <div class="stat-box" style="margin-bottom: 20px; border-color: var(--safe); background: rgba(34, 197, 94, 0.05); cursor: default;">
        <span style="color: var(--safe);">SALDO DI TANGAN (BELUM SETOR)</span>
        <b id="tunaiTangan" style="font-size: 18px; color: var(--safe);">Rp0</b>
    </div>

    <input type="text" id="searchBar" placeholder="🔍 Cari nama pembeli..." oninput="renderList()">
    <input type="file" id="cameraInput" accept="image/*" capture="camera">
    <div id="list">Memuat tugas...</div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVQGysGRlYJ2b4PekM3vaXKtx6UFvNlCk", databaseURL: "https://ej-tobacco-express-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const todayStr = new Date().toLocaleDateString('id-ID');
        let allOrders = [], totalSetoranGlobal = 0, currentFilter = "Sisa", currentId = null;

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.stat-box').forEach(el => el.classList.remove('active'));
            document.getElementById('f-' + f).classList.add('active');
            renderList();
        }

        db.ref('pesanan').on('value', snap => {
            const val = snap.val();
            allOrders = val ? Object.keys(val).map(k => ({id:k, ...val[k]})).reverse() : [];
            db.ref('setoran').on('value', sSnap => {
                totalSetoranGlobal = Object.values(sSnap.val() || {}).reduce((a, b) => a + b, 0);
                renderList();
            });
        });

        function renderList() {
            const keyword = document.getElementById('searchBar').value.toLowerCase();
            let html = "", s = 0, g = 0, p = 0, totalCodSuksesGlobal = 0;

            allOrders.forEach(o => {
                const isSisa = (o.status !== 'Terkirim' && o.status !== 'Gagal');
                if (o.tanggal === todayStr) {
                    if (o.status === 'Terkirim') s++; else if (o.status === 'Gagal') g++;
                }
                if (isSisa) p++;
                if (o.status === 'Terkirim' && o.metode === 'COD') totalCodSuksesGlobal += Number(o.total || 0);

                if (isSisa || o.tanggal === todayStr) {
                    const matchSearch = (o.namaPembeli || "").toLowerCase().includes(keyword);
                    const matchStatus = (currentFilter === "Sisa") ? isSisa : (o.status === currentFilter && o.tanggal === todayStr);

                    if (matchSearch && matchStatus) {
                        const wa = String(o.nohp || "").replace(/\D/g, '').replace(/^0/,'62');
                        const mapsUrl = (o.mapLink && o.mapLink.includes('http')) ? o.mapLink : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.alamat || "")}`;
                        
                        html += `<div class="order-card">
                            <div class="date-tag">${o.tanggal}</div>
                            <h3>${o.namaPembeli}</h3>
                            <p style="font-size:11px; opacity:0.7;">📍 ${o.alamat}</p>
                            <p style="color:var(--gold); font-weight:800; font-size:12px; margin-top:5px;">${o.metode} | Rp${Number(o.total || 0).toLocaleString()}</p>
                            ${isSisa ? `
                            <div class="btn-group">
                                <button class="btn" style="background:var(--safe)" onclick="takePhoto('${o.id}')">📸 SUKSES</button>
                                <button class="btn" style="background:var(--danger)" onclick="updateStatus('${o.id}','Gagal')">❌ GAGAL</button>
                            </div>` : `<p style="color:var(--gold); font-size:10px; margin-top:10px; font-weight:800;">STATUS: ${o.status.toUpperCase()}</p>`}
                            <div class="btn-group">
                                <a href="${mapsUrl}" target="_blank" class="btn" style="background:var(--blue)">MAPS</a>
                                <a href="https://wa.me/${wa}" class="btn" style="background:var(--wa)">WA</a>
                            </div>
                        </div>`;
                    }
                }
            });
            document.getElementById('countSukses').innerText = s;
            document.getElementById('countGagal').innerText = g;
            document.getElementById('countProses').innerText = p;
            document.getElementById('tunaiTangan').innerText = "Rp" + (totalCodSuksesGlobal - totalSetoranGlobal).toLocaleString();
            document.getElementById('list').innerHTML = html || "<p style='text-align:center; opacity:0.5; padding:20px;'>Kosong.</p>";
        }

        function takePhoto(id) { currentId = id; document.getElementById('cameraInput').click(); }

        document.getElementById('cameraInput').onchange = function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 400; canvas.height = (img.height / img.width) * 400;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    updateStatus(currentId, 'Terkirim', canvas.toDataURL('image/jpeg', 0.6));
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        function updateStatus(id, status, foto = null) {
            const data = { status: status }; if(foto) data.buktiFoto = foto;
            db.ref('pesanan/' + id).update(data).then(() => alert("Status Berhasil Diupdate!"));
        }
    </script>
</body>
</html>
