<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EJ KURIR V5</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
background:#050505;
color:white;
font-family:'Plus Jakarta Sans';
padding:15px;
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.card{
background:#111;
border:1px solid #D4AF37;
border-radius:15px;
padding:15px;
margin-bottom:15px;
}

.btn{
background:#D4AF37;
color:black;
padding:12px;
border-radius:10px;
border:none;
font-weight:700;
width:100%;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#111;
color:white;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="header">

<div>
<b style="color:#D4AF37">EJ TOBACCO</b><br>
<span id="namaKurir">...</span>
</div>

<div>
<div id="clock">00:00</div>
<div id="internet">ONLINE</div>
</div>

</div>

<div class="card">

<b>DOMPET COD</b>

<h2 id="totalCOD">Rp 0</h2>

</div>

<input id="searchOrder" placeholder="Cari pelanggan...">

<div id="orderContainer"></div>

<button class="btn" onclick="toggleScanner()">SCAN BARCODE</button>

<div id="reader"></div>

<script>

const firebaseConfig={
apiKey:"AIzaSyCP6q75dxdWmsvXlAU-ON0KyvzqGXeCaUg",
authDomain:"ejtobacco-v2.firebaseapp.com",
databaseURL:"https://ejtobacco-v2-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"ejtobacco-v2"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

let myName=""
let allData=[]

let html5QrCode=null

let lastScan=""

let lastLat=null
let lastLng=null

/* ======================
TANGGAL
====================== */

function getTgl(){

return new Date().toLocaleDateString('id-ID')

}

/* ======================
JAM
====================== */

setInterval(()=>{

document.getElementById("clock").innerText=
new Date().toLocaleTimeString('id-ID')

},1000)

/* ======================
STATUS INTERNET
====================== */

function updateInternet(){

if(navigator.onLine){

document.getElementById("internet").innerText="ONLINE"

}else{

document.getElementById("internet").innerText="OFFLINE"

}

}

window.addEventListener("online",updateInternet)
window.addEventListener("offline",updateInternet)

updateInternet()

/* ======================
LOGIN
====================== */

firebase.auth().onAuthStateChanged(user=>{

if(user){

myName=user.email.split("@")[0]

document.getElementById("namaKurir").innerText=myName

mulaiTarikData()

}

})

/* ======================
TARIK DATA
====================== */

function mulaiTarikData(){

db.ref("pesanan").limitToLast(200).on("value",snap=>{

let data=snap.val()

if(!data)return

allData=Object.keys(data).map(k=>({

id:k,
...data[k]

})).reverse()

simpanCache()

renderOrders()

})

}

/* ======================
CACHE OFFLINE
====================== */

function simpanCache(){

localStorage.setItem(
"cache_orders",
JSON.stringify(allData)
)

}

function loadCache(){

let cache=localStorage.getItem("cache_orders")

if(cache){

allData=JSON.parse(cache)

renderOrders()

}

}

loadCache()

/* ======================
RENDER ORDER
====================== */

function renderOrders(){

const container=document.getElementById("orderContainer")

const search=document
.getElementById("searchOrder")
.value
.toLowerCase()

const fragment=document.createDocumentFragment()

allData
.filter(o=>

(o.namaPembeli||"")
.toLowerCase()
.includes(search)

)
.forEach(o=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<b>${o.namaPembeli}</b><br>

${o.noPesanan}

<br><br>

<button class="btn"
onclick="ambilPaket('${o.id}')">

AMBIL PAKET

</button>

`

fragment.appendChild(card)

})

container.innerHTML=""

container.appendChild(fragment)

}

/* ======================
AMBIL PAKET
====================== */

function ambilPaket(id){

db.ref("pesanan/"+id).update({

status:"Proses",
kurir:myName,
tanggal:getTgl()

})

}

/* ======================
SCANNER
====================== */

function toggleScanner(){

let r=document.getElementById("reader")

if(r.style.display==="block"){

r.style.display="none"

if(html5QrCode){

html5QrCode.stop()

}

}else{

r.style.display="block"

startScanner()

}

}

function startScanner(){

html5QrCode=new Html5Qrcode("reader")

html5QrCode.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
onScanSuccess
)

}

function onScanSuccess(code){

if(code===lastScan)return

lastScan=code

setTimeout(()=>{

lastScan=""

},2000)

let order=allData.find(o=>
o.noPesanan===code
)

if(order){

ambilPaket(order.id)

}

}

/* ======================
GPS TRACKING
====================== */

function aktifkanRadar(){

navigator.geolocation.watchPosition(pos=>{

let lat=pos.coords.latitude
let lng=pos.coords.longitude

if(lastLat){

let jarak=Math.sqrt(
Math.pow(lat-lastLat,2)+
Math.pow(lng-lastLng,2)
)

if(jarak<0.0002){
return
}

}

lastLat=lat
lastLng=lng

db.ref("tracking/"+myName).set({

lat:lat,
lng:lng,
waktu:new Date().toLocaleTimeString()

})

})

}

aktifkanRadar()

</script>

</body>
</html>
