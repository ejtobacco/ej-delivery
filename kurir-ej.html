<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EJ DELIVERY - KURIR PRO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2); --text-main: #FFFFFF; --safe: #22C55E; --danger: #EF4444; --blue: #2563eb; --wa: #25D366; --warning: #F59E0B; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); padding: 12px; padding-bottom: 100px; overflow-x: hidden; user-select: none; }
        ::-webkit-scrollbar { display: none; }
        input, select { -webkit-user-select: text; user-select: text; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; position: sticky; top: 0; z-index: 9999; background: var(--bg); padding: 10px 0; border-bottom: 1px solid var(--glass-border); }
        .logo-text { color: var(--gold); font-weight: 800; font-size: 18px; letter-spacing: 1px; }
        .wallet-card { background: rgba(34, 197, 94, 0.05); border: 1px solid var(--safe); border-radius: 20px; padding: 20px; margin-bottom: 15px; text-align: center; }
        .wallet-card span { font-size: 10px; font-weight: 800; color: var(--safe); text-transform: uppercase; letter-spacing: 1.5px; }
        #totalCOD { display: block; font-size: 26px; font-weight: 800; color: var(--safe); margin-top: 5px; }
        .tab-menu { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        .tab-btn { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px 2px; border-radius: 12px; color: #fff; font-weight: 800; font-size: 9px; text-align: center; cursor: pointer; }
        .tab-btn.active { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); color: var(--gold); }
        .count-badge { display: block; font-size: 14px; margin-top: 2px; }
        .search-box { width: 100%; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white; margin-bottom: 15px; outline: none; }
        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden; transition: 0.3s; }
        .status-badge { position: absolute; top: 0; right: 0; padding: 6px 15px; font-size: 9px; font-weight: 800; border-radius: 0 0 0 15px; text-transform: uppercase; color: #000; }
        .btn { border: none; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 11px; cursor: pointer; color: white; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-success { background: var(--safe); }
        .btn-warning { background: var(--warning); color: #000; }
        .btn-danger { background: var(--danger); }
        .btn-wa { background: var(--wa); width: 100%; margin-top: 12px; color: white; }
        .btn-maps { background: var(--blue); width: 100%; margin-top: 8px; }
        .btn-scan { background: var(--gold); color: #000; width: 100%; margin-bottom: 15px; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 15px; display: none; border: 2px solid var(--gold); }
        .modal-view { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100000; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        #imgPreview { max-width: 90%; max-height: 75vh; border-radius: 15px; border: 2px solid var(--gold); object-fit: contain; }
        .btn-disabled { filter: grayscale(1); opacity: 0.5; pointer-events: none; }
        @keyframes blinkUrgent { 0% { border-color: var(--danger); } 50% { border-color: #fff; background: rgba(239, 68, 68, 0.2); } 100% { border-color: var(--danger); } }
        .card-urgent { animation: blinkUrgent 0.8s infinite !important; border: 2px solid var(--danger) !important; }
        
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin-container { text-align: center; width: 100%; max-width: 320px; padding: 20px; }
        .pin-display { font-size: 40px; letter-spacing: 15px; margin: 30px 0; color: var(--gold); font-weight: 800; text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
        .numpad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; width: 100%; }
        .num-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(212, 175, 55, 0.2); color: #fff; width: 75px; height: 75px; border-radius: 50%; font-size: 26px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .num-btn:active { background: var(--gold); color: #000; transform: scale(0.9); }
        
        select.kurir-select { background: #111; color: var(--gold); border: 2px solid var(--gold); padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 800; margin-bottom: 10px; outline: none; text-align: center; }
    </style>
</head>
<body>
    
    <audio id="beepSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <audio id="errorSound" src="https://assets.mixkit.co/active_storage/sfx/2180/2180-preview.mp3" preload="auto"></audio> 
    
    <div id="loginOverlay">
        <div class="pin-container">
            <h2 style="color:#fff; font-size:22px; margin-bottom:5px;">EJ ACCESS</h2>
            <p style="color:var(--gold); font-size:11px; letter-spacing:2px; margin-bottom:20px;">PILIH IDENTITAS KURIR</p>
            
            <select id="namaKurirInput" class="kurir-select">
                <option value="kurirA">👦 KURIR - kurirA</option>
                <option value="kurirB">👦 KURIR - kurirB</option>
                <option value="kurirC">👦 KURIR - kurirC</option>
            </select>

            <div class="pin-display" id="pinDisplay">****</div>
            <div class="numpad">
                <button class="num-btn" onclick="pressPin('1')">1</button><button class="num-btn" onclick="pressPin('2')">2</button><button class="num-btn" onclick="pressPin('3')">3</button>
                <button class="num-btn" onclick="pressPin('4')">4</button><button class="num-btn" onclick="pressPin('5')">5</button><button class="num-btn" onclick="pressPin('6')">6</button>
                <button class="num-btn" onclick="pressPin('7')">7</button><button class="num-btn" onclick="pressPin('8')">8</button><button class="num-btn" onclick="pressPin('9')">9</button>
                <button class="num-btn" onclick="pressPin('C')" style="color:var(--danger)">C</button><button class="num-btn" onclick="pressPin('0')">0</button><button class="num-btn" onclick="pressPin('OK')" style="color:var(--safe)">OK</button>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="logo-text" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            EJ DELIVERY <span style="font-weight:400; font-size:11px; color:#fff;">| <span id="namaKurirHeader">KURIR</span></span>
        </div>
        <div style="text-align: right;">
            <div id="currentDate" style="font-size: 9px; color: var(--gold); font-weight: 800; margin-bottom: 2px;">LOADING...</div>
            <div id="clock" style="font-size: 14px; font-weight: 800; color: var(--safe);">00:00:00</div>
            <div style="display: flex; align-items: center; gap: 5px; justify-content: flex-end; margin-top: 3px;">
                <div id="lampuKoneksi" style="width: 7px; height: 7px; background: var(--safe); border-radius: 50%; box-shadow: 0 0 8px var(--safe);"></div>
                <div id="teksKoneksi" style="font-size: 9px; color: var(--safe); font-weight: 800;">ONLINE</div>
            </div>
        </div>
    </div>

    <div class="wallet-card">
        <span>💰 UANG COD KAMU HARI INI</span>
        <b id="totalCOD">Rp 0</b>
    </div>

    <button class="btn btn-scan" id="btnScanMain" onclick="toggleScanner()">📷 SCAN BARCODE (AMBIL DARI GUDANG)</button>
    <div id="reader"></div>

    <input type="text" id="searchOrder" class="search-box" placeholder="🔍 Cari nama pembeli atau resi..." oninput="renderOrders()">

    <div class="tab-menu">
        <div class="tab-btn" id="t-Gudang" onclick="setTab('Gudang')">GUDANG KITA <span class="count-badge" id="c-Gudang">0</span></div>
        <div class="tab-btn active" id="t-Proses" onclick="setTab('Proses')">TAS SAYA <span class="count-badge" id="c-Proses">0</span></div>
        <div class="tab-btn" id="t-Terkirim" onclick="setTab('Terkirim')">SUKSES <span class="count-badge" id="c-Terkirim">0</span></div>
        <div class="tab-btn" id="t-Gagal" onclick="setTab('Gagal')">CANCEL <span class="count-badge" id="c-Gagal">0</span></div>
    </div>

    <div id="orderContainer">Memuat data...</div>

    <div id="modalView" class="modal-view" onclick="this.style.display='none'">
        <img id="imgPreview" src="">
        <p style="color:var(--gold); margin-top:15px; font-weight:800; font-size:12px;">TAP MANA SAJA UNTUK TUTUP</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
    const firebaseConfig = {
          apiKey: "AIzaSyCP6q75dxdWmsvXlAU-ON0KyvzqGXeCaUg",
          authDomain: "ejtobacco-v2.firebaseapp.com",
          databaseURL: "https://ejtobacco-v2-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "ejtobacco-v2",
          storageBucket: "ejtobacco-v2.firebasestorage.app",
          messagingSenderId: "366973371317",
          appId: "1:366973371317:web:c5ec32460cd9cf0f6c8ffc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

    let currentTab = 'Proses', allData = [], html5QrCode = null;
    let myName = ""; 

    function getTgl() { const n = new Date(); return `${String(n.getDate()).padStart(2,'0')}/${String(n.getMonth()+1).padStart(2,'0')}/${n.getFullYear()}`; }
    setInterval(() => { 
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID'); 
        document.getElementById('currentDate').innerText = now.toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'}).toUpperCase();
    }, 1000);

    let inputPin = "";
    const dataPIN = { "kurirA": "1111", "kurirB": "2222", "kurirC": "3333" };

    function pressPin(val) {
        if (val === 'C') { inputPin = ""; } 
        else if (val === 'OK') {
            const namaPilihan = document.getElementById('namaKurirInput').value;
            if (inputPin === dataPIN[namaPilihan]) {
                myName = namaPilihan; 
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('namaKurirHeader').innerText = myName;
                updateUI();
                aktifkanRadar();
            } else { alert("⚠️ PIN SALAH! Pastikan nama dan PIN sesuai."); inputPin = ""; }
        } 
        else { if (inputPin.length < 4) inputPin += val; }
        document.getElementById('pinDisplay').innerText = inputPin.length > 0 ? "*".repeat(inputPin.length) : "****";
    }
        
    // HANYA MENGAMBIL 100 DATA BIAR RINGAN!
    db.ref('pesanan').limitToLast(100).on('value', snap => {
        const val = snap.val();
        allData = val ? Object.keys(val).map(k => ({id:k, ...val[k]})).reverse() : [];
        if (myName !== "") updateUI();
    });

    function updateUI() {
        const today = getTgl();
        let gd=0, p=0, s=0, g=0, codDompetKu=0;
        allData.forEach(o => {
            if (o.status === 'Gudang') gd++;
            if (o.kurir === myName) {
                if (o.status === 'Proses' || o.status === 'Menunggu' || o.status === 'Tunda') p++;
                else if (o.status === 'Terkirim' && o.tanggal === today) {
                    s++;
                    if (o.metode === 'COD') codDompetKu += Number(o.total || 0);
                }
                else if (o.status === 'Gagal' && o.tanggal === today) g++;
            }
        });
        document.getElementById('c-Gudang').innerText = gd;
        document.getElementById('c-Proses').innerText = p;
        document.getElementById('c-Terkirim').innerText = s;
        document.getElementById('c-Gagal').innerText = g;
        document.getElementById('totalCOD').innerText = "Rp " + codDompetKu.toLocaleString('id-ID');
        renderOrders();
    }

    function renderOrders() {
        const container = document.getElementById('orderContainer');
        const search = document.getElementById('searchOrder').value.toLowerCase();
        const today = getTgl();
        container.innerHTML = "";
        
        const filtered = allData.filter(o => {
            const match = (o.namaPembeli || "").toLowerCase().includes(search) || (o.noPesanan || "").toLowerCase().includes(search);
            if (currentTab === 'Gudang') return match && o.status === 'Gudang';
            if (o.kurir !== myName) return false;
            if (currentTab === 'Proses') return match && (o.status !== 'Terkirim' && o.status !== 'Gagal' && o.status !== 'Gudang');
            return match && (o.status === currentTab && o.tanggal === today);
        });
        
        if (filtered.length === 0) { container.innerHTML = `<div style="text-align:center; padding:50px; opacity:0.3;">Kosong...</div>`; return; }
        
        filtered.forEach(o => {
            const badgeBg = o.status === 'Terkirim' ? 'var(--safe)' : (o.status === 'Gagal' ? 'var(--danger)' : 'var(--gold)');
            
            const waNum = String(o.nohp || "").replace(/\D/g, '').replace(/^0/, '62');
            const pesanWA = `Halo Kak *${o.namaPembeli}* 👋\n\nSaya kurir *${myName.toUpperCase()}* dari EJ TOBACCO.\nPosisi saya sudah dekat untuk mengantar paket pesanan Kakak.\n\nMohon siapkan uang pas *Rp ${Number(o.total || 0).toLocaleString('id-ID')}* ya Kak. Terima kasih! 🙏`;
            const linkWA = `https://wa.me/${waNum}?text=${encodeURIComponent(pesanWA)}`;

            let btnMapsHTML = '';
            if (o.mapLink && o.mapLink.trim() !== "") {
                let linkValid = o.mapLink.trim();
                if (!linkValid.startsWith("http")) linkValid = "https://" + linkValid; 
                btnMapsHTML = `<button onclick="window.open('${linkValid}', '_blank')" class="btn btn-maps">🗺️ BUKA MAPS / RUTE</button>`;
            }

            container.innerHTML += `
                <div class="glass-card ${o.urgent ? 'card-urgent' : ''}">
                    <div class="status-badge" style="background:${badgeBg}">${o.status}</div>
                    <span style="font-size:10px; color:var(--gold); font-weight:800;">${o.noPesanan}</span>
                    <h3 style="margin: 5px 0;">${o.namaPembeli}</h3>
                    <p style="font-size:12px; opacity:0.7; margin-bottom:10px;">📍 ${o.alamat}</p>
                    <div style="font-weight:800; color:var(--safe); font-size:13px; margin-bottom:10px;">TAGIHAN: Rp ${Number(o.total || 0).toLocaleString('id-ID')} (${o.metode})</div>
                    
                    ${o.status === 'Gudang' ? `
                        <button class="btn btn-success" style="width:100%; margin-top:10px;" onclick="ambilPaket('${o.id}')">📦 KLAIM & AMBIL PAKET INI</button>
                    ` : (o.status !== 'Terkirim' && o.status !== 'Gagal' ? `
                        // Tambahkan baris ini di bawah tombol WA lama
const pesanOTW = `*EJ TOBACCO DELIVERY* 🚀\n------------------------------------------\nHalo Kak *${o.namaPembeli.toUpperCase()}* 👋\n\nSaya kurir *${myName.toUpperCase()}* sedang meluncur ke arah Kakak. Estimasi sampai sekitar *5-15 menit* lagi.\n\nMohon siapkan uang pas *Rp${Number(o.total || 0).toLocaleString('id-ID')}* ya Kak, biar prosesnya cepat. Terima kasih! 🙏`;
const linkOTW = `https://wa.me/${waNum}?text=${encodeURIComponent(pesanOTW)}`;

// Ini kode tombolnya
container.innerHTML += `
    <button onclick="window.open('${linkOTW}', '_blank')" class="btn" style="background: #FF5722; width: 100%; margin-top: 8px; color: white;">🚀 SAYA MELUNCUR (OTW)</button>
`;
                        ${btnMapsHTML}
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px;">
                            <button class="btn btn-success" onclick="document.getElementById('f-${o.id}').click()">✅ SELESAI (FOTO)</button>
                            <button class="btn btn-warning" onclick="updateStat('${o.id}', 'Tunda')">⚠️ TUNDA</button>
                        </div>
                        <button class="btn btn-danger" style="width:100%; margin-top:8px;" onclick="updateStat('${o.id}', 'Gagal')">❌ CANCEL / GAGAL</button>
                    ` : ((o.adaFoto || o.buktiFoto) ? `<button class="btn" style="width:100%; margin-top:10px; background:rgba(255,255,255,0.05); border:1px solid var(--gold); color:var(--gold);" onclick="preview('${o.id}', '${o.buktiFoto || ''}')">👁️ LIHAT FOTO BUKTI</button>` : ''))}
                    
                    <input type="file" id="f-${o.id}" accept="image/*" capture="environment" style="display:none;" onchange="uploadSelesai('${o.id}', this)">
                </div>
            `;
        });
    }

    function setTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('t-' + tab).classList.add('active');
        renderOrders();
    }

    function ambilPaket(id) {
        db.ref('pesanan/' + id).update({ status: 'Proses', kurir: myName, waktuAmbil: new Date().toLocaleTimeString() })
          .then(() => alert("✅ Paket masuk ke Tas Anda!"));
    }

    function catatBukuKas(tanggal, jenis, omzet = 0, metode = 'COD') {
        if(!tanggal) return; const p = tanggal.split('/'); if(p.length !== 3) return;
        const blnId = `${p[2]}-${p[1]}`; const ref = db.ref(`laporanBulanan/${blnId}`);
        if (jenis === 'Sukses') {
            ref.child('suksesCount').set(firebase.database.ServerValue.increment(1));
            ref.child('totalOmzet').set(firebase.database.ServerValue.increment(omzet));
            if(metode === 'COD') ref.child('codCount').set(firebase.database.ServerValue.increment(1)); else ref.child('transferCount').set(firebase.database.ServerValue.increment(1));
        } else if (jenis === 'Gagal') ref.child('gagalCount').set(firebase.database.ServerValue.increment(1));
    }

    function updateStat(id, stat, autoAlasan) {
        const o = allData.find(x => x.id === id);
        const alasan = autoAlasan || prompt("Masukkan Alasan/Catatan:");
        if (alasan) {
            db.ref('pesanan/' + id).update({ status: stat, alasanTunda: alasan, waktuUpdate: new Date().toLocaleTimeString() }).then(() => {
                if(stat === 'Gagal' && o) catatBukuKas(o.tanggal, 'Gagal'); 
            });
        }
    }

    // PISAH KAMAR FOTO ADA DI SINI
    function uploadSelesai(id, input) {
        const file = input.files[0]; if (!file) return;
        const o = allData.find(x => x.id === id);
        const catatan = prompt("Catatan Tambahan (Contoh: Titip Satpam):") || "-";
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let width = img.width; let height = img.height;
                if (width > height) { if (width > 600) { height *= 600 / width; width = 600; } } else { if (height > 800) { width *= 800 / height; height = 800; } }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.5);

                db.ref('foto_bukti/' + id).set(compressedDataUrl).then(() => {
                    db.ref('pesanan/' + id).update({ 
                        status: 'Terkirim', adaFoto: true, catatanKurir: catatan, waktuSelesai: new Date().toLocaleTimeString() 
                    }).then(() => { 
                        if(o) catatBukuKas(o.tanggal, 'Sukses', Number(o.total || 0), o.metode); 
                        alert("✅ Berhasil Terkirim!"); input.value = ""; 
                    }).catch(err => alert("❌ Gagal Update Pesanan: " + err.message));
                }).catch(err => alert("❌ Gagal Upload Foto: " + err.message));
            }
            img.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    function preview(id, oldSrc) { 
        document.getElementById('modalView').style.display = 'flex'; 
        const img = document.getElementById('imgPreview');
        img.src = "";
        if (oldSrc && oldSrc.length > 100) { img.src = oldSrc; } 
        else { db.ref('foto_bukti/' + id).once('value').then(snap => { if(snap.exists()) img.src = snap.val(); else alert("Foto tidak ditemukan!"); }); }
    }

    function toggleScanner() { const r = document.getElementById('reader'); if (r.style.display === 'block') stopScanner(); else startScanner(); }

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('btnScanMain').innerText = "🛑 BERHENTI SCAN";
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
            const target = allData.find(o => o.noPesanan.replace(/[^a-zA-Z0-9]/g, "") === decodedText.replace(/[^a-zA-Z0-9]/g, ""));
            if (target) {
                if (target.status !== 'Gudang' && currentTab === 'Gudang') {
                    const errSnd = document.getElementById('errorSound'); if(errSnd) errSnd.play();
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                    alert("⚠️ SUDAH DIAMBIL OLEH KURIR LAIN!"); return;
                }
                const sound = document.getElementById('beepSound'); if(sound) sound.play(); 
                if (navigator.vibrate) navigator.vibrate(100);
                
                if (target.status === 'Gudang') {
                    db.ref('pesanan/' + target.id).update({ status: 'Proses', kurir: myName, waktuAmbil: new Date().toLocaleTimeString() });
                } else {
                    document.getElementById('searchOrder').value = target.noPesanan;
                    renderOrders(); stopScanner();
                }
            }
        });
    }

    function stopScanner() {
        if (html5QrCode) html5QrCode.stop().then(() => { document.getElementById('reader').style.display = 'none'; document.getElementById('btnScanMain').innerText = "📷 SCAN BARCODE"; }).catch(() => { document.getElementById('reader').style.display = 'none'; document.getElementById('btnScanMain').innerText = "📷 SCAN BARCODE"; });
    }

    function updateStatusInternet() {
        const lampu = document.getElementById('lampuKoneksi'); const teks = document.getElementById('teksKoneksi');
        if (navigator.onLine) { db.goOnline(); if(lampu) lampu.style.background = "var(--safe)"; if(teks) teks.innerText = "ONLINE"; } 
        else { db.goOffline(); if(lampu) lampu.style.background = "var(--danger)"; if(teks) teks.innerText = "OFFLINE"; }
    }
    window.addEventListener('online', updateStatusInternet); window.addEventListener('offline', updateStatusInternet); updateStatusInternet();
   
    // === FITUR RADAR KURIR ===
    function aktifkanRadar() {
        if (navigator.geolocation) {
            // Minta HP terus-terusan kirim lokasi akurat
            navigator.geolocation.watchPosition(
                (posisi) => {
                    db.ref('tracking/' + myName).set({
                        lat: posisi.coords.latitude,
                        lng: posisi.coords.longitude,
                        waktu: new Date().toLocaleTimeString('id-ID')
                    });
                },
                (error) => { console.log("GPS Error: ", error.message); },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        } else {
            alert("⚠️ HP ini tidak mendukung GPS Radar.");
        }
    }
        
    </script>
