<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EJ DELIVERY - KURIR PRO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- 1. IDENTITAS WARNA (SINGKRON ADMIN) --- */
        :root { 
            --gold: #D4AF37; 
            --gold-gradient: linear-gradient(135deg, #F7E08C, #D4AF37);
            --bg: #050505; 
            --glass: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(212, 175, 55, 0.2); 
            --text-main: #FFFFFF; 
            --safe: #22C55E; 
            --danger: #EF4444; 
            --blue: #2563eb; 
            --wa: #25D366; 
            --warning: #F59E0B;
        }

        /* --- 2. RESET GLOBAL (FULL SCREEN MODE) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        html { scroll-behavior: smooth; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            width: 100%; 
            margin: 0; 
            padding: 12px; /* Singkron dengan Admin */
            padding-bottom: 100px;
            overflow-x: hidden; 
            -webkit-user-select: none; 
            user-select: none;
        }

        ::-webkit-scrollbar { display: none; }
        input, textarea { -webkit-user-select: text; user-select: text; width: 100%; }
        img { pointer-events: none; -webkit-user-drag: none; }

        /* --- 3. KOMPONEN UI --- */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; position: sticky; top: 0; z-index: 9999; background: var(--bg); padding: 10px 0; border-bottom: 1px solid var(--glass-border); }
        .logo-text { color: var(--gold); font-weight: 800; font-size: 18px; letter-spacing: 1px; }

        .wallet-card { background: rgba(34, 197, 94, 0.05); border: 1px solid var(--safe); border-radius: 20px; padding: 20px; margin-bottom: 15px; text-align: center; }
        .wallet-card span { font-size: 10px; font-weight: 800; color: var(--safe); text-transform: uppercase; letter-spacing: 1.5px; }
        #totalCOD { display: block; font-size: 26px; font-weight: 800; color: var(--safe); margin-top: 5px; }

        .tab-menu { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tab-btn { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px 5px; border-radius: 12px; color: #fff; font-weight: 800; font-size: 10px; text-align: center; cursor: pointer; }
        .tab-btn.active { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); color: var(--gold); }
        .count-badge { display: block; font-size: 14px; margin-top: 2px; }

        .search-box { width: 100%; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white; margin-bottom: 15px; outline: none; }

        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .status-badge { position: absolute; top: 0; right: 0; padding: 6px 15px; font-size: 9px; font-weight: 800; border-radius: 0 0 0 15px; text-transform: uppercase; color: #000; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .btn { border: none; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 11px; cursor: pointer; color: white; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-success { background: var(--safe); }
        .btn-warning { background: var(--warning); color: #000; }
        .btn-danger { background: var(--danger); }
        .btn-wa { background: var(--wa); width: 100%; margin-top: 12px; color: white; }
        .btn-maps { background: var(--blue); width: 100%; margin-top: 8px; }

        /* --- MODAL FOTO (SINGKRON ADMIN) --- */
        .modal-view { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100000; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        #imgPreview { max-width: 90%; max-height: 75vh; border-radius: 15px; border: 2px solid var(--gold); object-fit: contain; }

        #notifBanner { background: rgba(212, 175, 55, 0.05); border: 1px dashed var(--gold); color: var(--gold); padding: 15px; text-align: center; border-radius: 15px; margin-bottom: 15px; cursor: pointer; }
  
        /* Efek tombol saat offline */
.btn-disabled {
    filter: grayscale(1) !important;
    opacity: 0.5 !important;
    cursor: not-allowed !important;
    pointer-events: none !important; /* Kunci klik total */
}
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            EJ DELIVERY <span style="font-weight:400; font-size:11px; color:#fff;">| KURIR</span>
        </div>
        <div style="text-align: right;">
            <div id="clock" style="font-size: 14px; font-weight: 800; color: var(--safe);">00:00:00</div>
            <div style="display: flex; align-items: center; gap: 5px; justify-content: flex-end; margin-top: 3px;">
                <div id="lampuKoneksi" style="width: 7px; height: 7px; background: var(--safe); border-radius: 50%; box-shadow: 0 0 8px var(--safe); transition: 0.3s;"></div>
                <div id="teksKoneksi" style="font-size: 9px; color: var(--safe); font-weight: 800; letter-spacing: 0.5px;">ONLINE</div>
            </div>
        </div>
    </div>

    <div class="wallet-card">
        <span>💰 Saldo COD Harus Setor</span>
        <b id="totalCOD">Rp 0</b>
    </div>

    <div id="notifBanner" onclick="aktifkanSuara()">
        <span style="font-size: 16px;">🔔</span> <b style="font-size: 11px;">TAP UNTUK AKTIFKAN NOTIFIKASI SUARA</b>
    </div>

    <input type="text" id="searchOrder" class="search-box" placeholder="🔍 Cari nama pembeli..." oninput="renderOrders()">

    <div class="tab-menu">
        <div class="tab-btn active" id="t-Proses" onclick="setTab('Proses')">SISA <span class="count-badge" id="c-Proses">0</span></div>
        <div class="tab-btn" id="t-Terkirim" onclick="setTab('Terkirim')">SUKSES <span class="count-badge" id="c-Terkirim">0</span></div>
        <div class="tab-btn" id="t-Gagal" onclick="setTab('Gagal')">CANCEL <span class="count-badge" id="c-Gagal">0</span></div>
    </div>

    <div id="orderContainer">Memuat data...</div>

    <div id="modalView" class="modal-view" onclick="this.style.display='none'">
        <img id="imgPreview" src="">
        <p style="color:var(--gold); margin-top:15px; font-weight:800; font-size:12px;">TAP MANA SAJA UNTUK TUTUP</p>
    </div>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
        // Fungsi Hitung Jarak (Hasilnya dalam satuan Meter)
function hitungJarak(lat1, lon1, lat2, lon2) {
    const R = 6371e3; // Jari-jari bumi dalam meter
    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;
    const Δφ = (lat2-lat1) * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;

    const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
              Math.cos(φ1) * Math.cos(φ2) *
              Math.sin(Δλ/2) * Math.sin(Δλ/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c; 
}
        
        const firebaseConfig = { apiKey: "AIzaSyAVQGysGRlYJ2b4PekM3vaXKtx6UFvNlCk", databaseURL: "https://ej-tobacco-express-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentTab = 'Proses', allData = [], totalSetoranGlobal = 0, lastCount = 0, audioIzin = false;

        function getTgl() { const n = new Date(); return `${String(n.getDate()).padStart(2,'0')}/${String(n.getMonth()+1).padStart(2,'0')}/${n.getFullYear()}`; }
        
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);

        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t-' + tab).classList.add('active');
            renderOrders();
        }

        db.ref('pesanan').on('value', snap => {
            const val = snap.val();
            allData = val ? Object.keys(val).map(k => ({id:k, ...val[k]})).reverse() : [];
            
            // Logika Notifikasi Suara
            if (lastCount > 0 && allData.length > lastCount && audioIzin) {
                const snd = document.getElementById('notifSound');
                snd.currentTime = 0; snd.play();
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            }
            lastCount = allData.length;
            updateUI();
        });

        db.ref('setoran').on('value', snap => {
            totalSetoranGlobal = Object.values(snap.val() || {}).reduce((a, b) => a + b, 0);
            updateUI();
        });

        function updateUI() {
            const today = getTgl();
            let p=0, s=0, g=0, codTotal=0;

            allData.forEach(o => {
                const isToday = o.tanggal === today;
                if (o.status === 'Terkirim' && o.metode === 'COD') codTotal += Number(o.total || 0);
                if (o.status !== 'Terkirim' && o.status !== 'Gagal') p++;
                else if (o.status === 'Terkirim' && isToday) s++;
                else if (o.status === 'Gagal' && isToday) g++;
            });

            document.getElementById('c-Proses').innerText = p;
            document.getElementById('c-Terkirim').innerText = s;
            document.getElementById('c-Gagal').innerText = g;
            document.getElementById('totalCOD').innerText = "Rp " + (codTotal - totalSetoranGlobal).toLocaleString();
            renderOrders();
        }

        function renderOrders() {
            const container = document.getElementById('orderContainer');
            const search = document.getElementById('searchOrder').value.toLowerCase();
            const today = getTgl();
            container.innerHTML = "";

            const filtered = allData.filter(o => {
                const matchName = (o.namaPembeli || "").toLowerCase().includes(search) || (o.noPesanan || "").toLowerCase().includes(search);
                if (currentTab === 'Proses') return matchName && (o.status !== 'Terkirim' && o.status !== 'Gagal');
                return matchName && (o.status === currentTab && o.tanggal === today);
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:50px; opacity:0.3; font-size:12px;">Data tidak ditemukan.</div>`;
                return;
            }

            filtered.forEach(o => {
                const badgeBg = o.status === 'Terkirim' ? 'var(--safe)' : (o.status === 'Gagal' ? 'var(--danger)' : 'var(--gold)');
                const waNum = String(o.nohp || "").replace(/\D/g, '').replace(/^0/, '62');
                
                container.innerHTML += `
                    <div class="glass-card">
                        <div class="status-badge" style="background:${badgeBg}">${o.status}</div>
                        <span style="font-size:10px; color:var(--gold); font-weight:800;">${o.noPesanan}</span>
                        <h3 style="margin: 5px 0; font-size:18px;">${o.namaPembeli}</h3>
                        <p style="font-size:12px; opacity:0.7; margin-bottom:10px;">📍 ${o.alamat}</p>
                        <div style="font-weight:800; color:var(--safe); font-size:13px;">TAGIHAN: Rp ${Number(o.total).toLocaleString()} (${o.metode})</div>
                        
                        ${o.status !== 'Terkirim' && o.status !== 'Gagal' ? `
                            <a href="https://wa.me/${waNum}" class="btn btn-wa">💬 HUBUNGI PEMBELI</a>
                            ${o.mapLink ? `<a href="${o.mapLink}" class="btn btn-maps" target="_blank">🗺️ PENUNJUK JALAN</a>` : ''}
                            <div class="btn-group">
                                <button class="btn btn-success" onclick="document.getElementById('f-${o.id}').click()">✅ SELESAI</button>
                                <button class="btn btn-warning" onclick="updateStat('${o.id}', 'Tunda')">⚠️ TUNDA</button>
                            </div>
                            <button class="btn btn-danger" style="width:100%; margin-top:8px;" onclick="updateStat('${o.id}', 'Gagal')">❌ CANCEL / GAGAL</button>
                        ` : (o.buktiFoto ? `<button class="btn" style="width:100%; margin-top:10px; background:rgba(255,255,255,0.05); border:1px solid var(--gold); color:var(--gold);" onclick="preview('${o.buktiFoto}')">👁️ LIHAT FOTO BUKTI</button>` : '')}
                        
                        <input type="file" id="f-${o.id}" accept="image/*" capture="camera" style="display:none;" onchange="upload('${o.id}', this)">
                    </div>
                `;
            });
        }

        function updateStat(id, stat) {
            const alasan = prompt("Masukkan Alasan (Wajib):");
            if (alasan && alasan.trim() !== "") {
                db.ref('pesanan/' + id).update({ status: stat, alasanTunda: alasan, waktuUpdate: new Date().toLocaleTimeString() });
            } else { alert("Alasan tidak boleh kosong!"); }
        }

        function upload(id, input) {
    const o = allData.find(item => item.id === id);
    if (!o.mapLink) { 
        alert("Peringatan: Data pelanggan tidak punya link Maps. Izin kirim tanpa radius diberikan.");
        gasUpload(id, input);
        return;
    }

    // Ambil Lokasi Kurir Sekarang
    navigator.geolocation.getCurrentPosition((pos) => {
        const kurirLat = pos.coords.latitude;
        const kurirLng = pos.coords.longitude;
        
        // Ambil Koordinat Tujuan dari Link Maps
        const kords = extractCoords(o.mapLink); // Gunakan fungsi extract yang sudah kita buat
        if (!kords) return gasUpload(id, input);

        const jarak = hitungJarak(kurirLat, kurirLng, kords.lat, kords.lng);

        if (jarak > 100) { // BATAS 100 METER
            alert(`⚠️ AKSES DITOLAK!\nJarak Anda ${Math.round(jarak)}m dari lokasi. Anda harus berada maksimal 100m dari rumah pelanggan.`);
            input.value = ""; // Reset input file
        } else {
            gasUpload(id, input);
        }
    }, () => {
        alert("❌ GPS HP Mati! Aktifkan lokasi agar bisa klik SELESAI.");
    });
}

// Fungsi bantu untuk proses simpan setelah lolos radius
function gasUpload(id, input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        db.ref('pesanan/' + id).update({
            status: 'Terkirim',
            buktiFoto: e.target.result,
            waktuSelesai: new Date().toLocaleTimeString()
        }).then(() => alert("✅ Mantap Bos! Paket Berhasil Terkirim."));
    };
    reader.readAsDataURL(input.files[0]);
}

        function preview(src) { document.getElementById('imgPreview').src = src; document.getElementById('modalView').style.display = 'flex'; }

        function aktifkanSuara() {
            const snd = document.getElementById('notifSound');
            snd.play().then(() => {
                snd.pause(); audioIzin = true;
                const b = document.getElementById('notifBanner');
                b.style.background = "rgba(34, 197, 94, 0.1)";
                b.style.color = "var(--safe)";
                b.innerHTML = "✅ NOTIFIKASI SUARA AKTIF";
                setTimeout(() => b.style.display = 'none', 2000);
            });
        }

        // --- SISTEM DETEKSI KONEKSI KURIR ---
window.addEventListener('online', updateStatusInternet);
window.addEventListener('offline', updateStatusInternet);

function updateStatusInternet() {
    const lampu = document.getElementById('lampuKoneksi');
    const teks = document.getElementById('teksKoneksi');
    // Ambil semua tombol di layar
    const allButtons = document.querySelectorAll('.btn, .btn-main, .btn-wa, .btn-maps');
    
    if (navigator.onLine) {
        // --- MODE ONLINE (NORMAL) ---
        if(lampu) { lampu.style.background = "var(--safe)"; lampu.style.boxShadow = "0 0 10px var(--safe)"; }
        if(teks) { teks.innerText = "ONLINE"; teks.style.color = "var(--safe)"; }
        
        // Aktifkan kembali semua tombol
        allButtons.forEach(btn => btn.classList.remove('btn-disabled'));

    } else {
        // --- MODE OFFLINE (LOCK) ---
        if(lampu) { lampu.style.background = "var(--danger)"; lampu.style.boxShadow = "0 0 10px var(--danger)"; }
        if(teks) { teks.innerText = "OFFLINE"; teks.style.color = "var(--danger)"; }
        
        // BEKUKAN semua tombol
        allButtons.forEach(btn => btn.classList.add('btn-disabled'));
        
        if (navigator.vibrate) navigator.vibrate(500);
        console.log("Sistem terkunci karena offline.");
    }
}

// Jalankan sekali saat baru buka aplikasi
updateStatusInternet();
    </script>
</body>
</html>
