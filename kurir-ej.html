<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ DELIVERY - KURIR PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #FFD700; --gold-gradient: linear-gradient(135deg, #FFD700 0%, #B8860B 100%);
            --bg: #000000; --card: rgba(255, 255, 255, 0.04); --border: rgba(255, 215, 0, 0.15);
            --text: #FFFFFF; --muted: #888888; --safe: #00FF88; --danger: #FF3333; --wa: #25D366; --warning: #F59E0B; --blue: #2563eb;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; padding-bottom: 80px; min-height: 100vh; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-text { color: var(--gold); font-weight: 800; font-size: 18px; letter-spacing: 1px; }

        /* Wallet Card (Sinkron Admin) */
        .wallet-card { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--safe); border-radius: 24px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .wallet-card span { font-size: 10px; font-weight: 800; color: var(--safe); text-transform: uppercase; letter-spacing: 1.5px; }
        #totalCOD { display: block; font-size: 28px; font-weight: 800; color: var(--safe); margin-top: 5px; }

        /* Tab Menu */
        .tab-menu { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: var(--card); border: 1px solid var(--border); padding: 12px 5px; border-radius: 15px; color: #fff; font-weight: 800; font-size: 10px; text-align: center; cursor: pointer; position: relative; }
        .tab-btn.active { background: var(--gold-gradient); border-color: transparent; color: #000; }
        .count-badge { display: block; font-size: 14px; margin-top: 2px; }

        .search-box { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 12px; color: white; margin-bottom: 15px; outline: none; }

        .glass-card { background: var(--card); border: 1px solid var(--border); border-radius: 22px; padding: 18px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .status-badge { position: absolute; top: 0; right: 0; padding: 5px 12px; font-size: 9px; font-weight: 800; border-radius: 0 0 0 12px; text-transform: uppercase; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .btn { border: none; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 12px; cursor: pointer; color: white; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-success { background: var(--safe); }
        .btn-warning { background: var(--warning); color: black; }
        .btn-danger { background: var(--danger); }
        .btn-wa { background: var(--wa); width: 100%; margin-top: 15px; }
        .btn-maps { background: var(--blue); width: 100%; margin-top: 8px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        #imgPreview { max-width: 90%; border-radius: 15px; border: 2px solid var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">EJ DELIVERY <span style="font-weight:400; font-size:12px; color:#fff;">| KURIR</span></div>
        <div id="clock" style="font-size: 14px; font-weight: 600; color: #fff;">00:00:00</div>
    </div>

    <div class="wallet-card">
        <span>💰 Uang COD di Tangan</span>
        <b id="totalCOD">Rp 0</b>
    </div>

    <input type="text" id="searchOrder" class="search-box" placeholder="🔍 Cari nama pembeli..." oninput="renderOrders()">

    <div class="tab-menu">
        <div class="tab-btn active" id="t-Proses" onclick="setTab('Proses')">PROSES <span class="count-badge" id="c-Proses">0</span></div>
        <div class="tab-btn" id="t-Terkirim" onclick="setTab('Terkirim')">SUKSES <span class="count-badge" id="c-Terkirim">0</span></div>
        <div class="tab-btn" id="t-Gagal" onclick="setTab('Gagal')">CANCEL <span class="count-badge" id="c-Gagal">0</span></div>
    </div>

    <div id="orderContainer"></div>

    <div id="modalView" class="modal" onclick="this.style.display='none'"><img id="imgPreview" src=""><p style="color:white; margin-top:10px; font-size:12px;">KLIK UNTUK TUTUP</p></div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVQGysGRlYJ2b4PekM3vaXKtx6UFvNlCk", databaseURL: "https://ej-tobacco-express-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentTab = 'Proses';
        let allData = [];
        let totalSetoranGlobal = 0;

        function getTodayString() {
            const n = new Date();
            return `${String(n.getDate()).padStart(2,'0')}/${String(n.getMonth()+1).padStart(2,'0')}/${n.getFullYear()}`;
        }

        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t-' + tab).classList.add('active');
            renderOrders();
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);

        // Listener Data Pesanan
        db.ref('pesanan').on('value', snap => {
            const val = snap.val();
            allData = val ? Object.keys(val).map(k => ({id:k, ...val[k]})).reverse() : [];
            updateStats();
        });

        // Listener Data Setoran (Sinkron Admin)
        db.ref('setoran').on('value', snap => {
            totalSetoranGlobal = Object.values(snap.val() || {}).reduce((a, b) => a + b, 0);
            updateStats();
        });

        function updateStats() {
            const today = getTodayString();
            let p = 0, s = 0, g = 0, codAll = 0;

            allData.forEach(o => {
                const isToday = o.tanggal === today;
                
                // Rumus Saldo: Semua COD yang Terkirim (akumulasi)
                if (o.status === 'Terkirim' && o.metode === 'COD') {
                    codAll += Number(o.total || 0);
                }

                // Counter Tab
                if (o.status !== 'Terkirim' && o.status !== 'Gagal') p++;
                else if (o.status === 'Terkirim' && isToday) s++;
                else if (o.status === 'Gagal' && isToday) g++;
            });

            document.getElementById('c-Proses').innerText = p;
            document.getElementById('c-Terkirim').innerText = s;
            document.getElementById('c-Gagal').innerText = g;
            
            // Saldo = Total COD - Setoran Admin
            document.getElementById('totalCOD').innerText = "Rp " + (codAll - totalSetoranGlobal).toLocaleString();
            renderOrders();
        }

        function renderOrders() {
            const container = document.getElementById('orderContainer');
            const search = document.getElementById('searchOrder').value.toLowerCase();
            const today = getTodayString();
            container.innerHTML = "";

            const filtered = allData.filter(o => {
                const mS = (o.namaPembeli || "").toLowerCase().includes(search);
                const isToday = o.tanggal === today;

                if (currentTab === 'Proses') return mS && (o.status !== 'Terkirim' && o.status !== 'Gagal');
                return mS && (o.status === currentTab) && isToday;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:40px; opacity:0.5; font-size:13px;">Tidak ada pengiriman.</div>`;
                return;
            }

            filtered.forEach(o => {
                const badgeColor = o.status === 'Terkirim' ? 'var(--safe)' : (o.status === 'Gagal' ? 'var(--danger)' : 'var(--gold)');
                const waNum = String(o.nohp || "").replace(/\D/g, '').replace(/^0/, '62');
                const teksWA = encodeURIComponent(`Halo Kak ${o.namaPembeli}, saya Kurir EJ Tobacco.\nSaya sedang menuju lokasi untuk mengantar paket Kakak.`);
                
                let buttons = "";
                if (o.status !== 'Terkirim' && o.status !== 'Gagal') {
                    buttons = `
                        <a href="https://wa.me/${waNum}?text=${teksWA}" class="btn btn-wa">💬 HUBUNGI PEMBELI</a>
                        <div class="btn-group">
                            <button class="btn btn-success" onclick="document.getElementById('file-${o.id}').click()">✅ SELESAI</button>
                            <button class="btn btn-warning" onclick="updateStatus('${o.id}', 'Tunda')">⚠️ TUNDA</button>
                        </div>
                        <button class="btn btn-danger" style="width:100%; margin-top:8px;" onclick="updateStatus('${o.id}', 'Gagal')">❌ CANCEL</button>
                    `;
                } else if (o.buktiFoto) {
                    buttons = `<button class="btn" style="background:var(--card); border:1px solid var(--safe); color:var(--safe);" onclick="previewFoto('${o.buktiFoto}')">👁️ LIHAT FOTO BUKTI</button>`;
                }

                container.innerHTML += `
                    <div class="glass-card">
                        <div class="status-badge" style="background:${badgeColor}">${o.status}</div>
                        <span style="font-size:10px; color:var(--gold); font-weight:800;">${o.noPesanan}</span>
                        <h3 style="margin-top:5px; font-size:17px;">${o.namaPembeli}</h3>
                        <p style="font-size:12px; margin-top:5px; opacity:0.7;">📍 ${o.alamat}</p>
                        <div style="margin-top:10px; font-weight:800; color:var(--safe);">TAGIHAN: Rp ${Number(o.total).toLocaleString()} (${o.metode})</div>
                        ${o.alasanTunda ? `<div style="color:var(--warning); font-size:11px; margin-top:10px; font-weight:800;">⚠️ ${o.alasanTunda}</div>` : ''}
                        ${o.mapLink ? `<a href="${o.mapLink}" class="btn btn-maps" target="_blank">🗺️ PENUNJUK JALAN</a>` : ''}
                        ${buttons}
                        <input type="file" id="file-${o.id}" accept="image/*" capture="camera" style="display:none;" onchange="doUpload('${o.id}', this)">
                    </div>
                `;
            });
        }

        function updateStatus(id, stat) {
            const msg = stat === 'Tunda' ? "Alasan Tunda:" : "Alasan Gagal:";
            const alasan = prompt(msg);
            if (alasan) {
                db.ref('pesanan/' + id).update({ 
                    status: stat, 
                    alasanTunda: alasan,
                    waktuUpdate: new Date().toLocaleTimeString()
                });
            }
        }

        function doUpload(id, input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                db.ref('pesanan/' + id).update({
                    status: 'Terkirim',
                    buktiFoto: e.target.result,
                    alasanTunda: null,
                    waktuSelesai: new Date().toLocaleTimeString()
                }).then(() => alert("Berhasil Terkirim!"));
            };
            reader.readAsDataURL(file);
        }

        function previewFoto(src) {
            document.getElementById('imgPreview').src = src;
            document.getElementById('modalView').style.display = 'flex';
        }
    </script>
</body>
</html>
