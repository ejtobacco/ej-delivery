<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Tracking - EJ Delivery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --gold: #D4AF37; 
            --bg: #050505; 
            --safe: #22C55E; 
            --danger: #EF4444;
            --blue: #3B82F6;
            --gradient-dark: linear-gradient(145deg, #111, #000);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg);
            color: white;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header Info */
        .tracking-header {
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-bottom: 2px solid var(--gold);
            z-index: 1000;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-title {
            color: var(--gold);
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .courier-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 10px;
        }

        /* Area Peta */
        #map {
            flex: 1;
            width: 100%;
            background: #111;
            z-index: 1;
        }

        /* Status Offline/Online */
        .status-badge {
            font-size: 10px;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-online {
            background: rgba(34, 197, 94, 0.2);
            color: var(--safe);
            border: 1px solid var(--safe);
        }

        .status-offline {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        /* Custom Marker Kurir */
        .kurir-marker {
            background: var(--gold);
            color: black;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
            border: 2px solid white;
            animation: pulseMarker 2s infinite;
        }

        @keyframes pulseMarker {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        
        /* Floating Button Re-center */
        .btn-center {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            background: var(--blue);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="tracking-header">
        <div class="header-title">
            <i class="fa-solid fa-crown"></i> EJ TOBACCO DELIVERY
        </div>
        <p style="font-size: 11px; color: gray;">Pantau posisi kurir Anda secara real-time.</p>
        
        <div class="courier-info">
            <div>
                <span style="font-size: 9px; color: gray; display: block;">NAMA KURIR</span>
                <b id="namaKurir" style="font-size: 14px; color: white;">MENCARI...</b>
            </div>
            <div id="statusKurir" class="status-badge status-offline">
                <i class="fa-solid fa-spinner fa-spin"></i> MENGHUBUNGKAN
            </div>
        </div>
        <div style="font-size: 10px; color: var(--safe); margin-top: 8px; text-align: right;">
            Update Terakhir: <span id="waktuUpdate">-</span>
        </div>
    </div>

    <div id="map"></div>

    <button class="btn-center" onclick="fokusKeKurir()">
        <i class="fa-solid fa-location-crosshairs"></i>
    </button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>

    <script>
        // 1. Inisialisasi Firebase (Samakan dengan file admin/kurir Anda)
        const firebaseConfig = {
            apiKey: "AIzaSyCP6q75dxdWmsvXlAU-ON0KyvzqGXeCaUg",
            authDomain: "ejtobacco-v2.firebaseapp.com",
            databaseURL: "https://ejtobacco-v2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ejtobacco-v2",
            storageBucket: "ejtobacco-v2.firebasestorage.app",
            messagingSenderId: "366973371317",
            appId: "1:366973371317:web:c5ec32460cd9cf0f6c8ffc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. Ambil Nama Kurir dari Link (contoh: tracking.html?n=kurira)
        const urlParams = new URLSearchParams(window.location.search);
        const kurirAktif = urlParams.get('n');
        
        document.getElementById('namaKurir').innerText = kurirAktif ? kurirAktif.toUpperCase() : "TIDAK DIKETAHUI";

        // 3. Setup Peta Peta Leaflet
        // Default posisi tengah Indonesia jika GPS belum dapat
        let map = L.map('map', { zoomControl: false }).setView([-2.5489, 118.0148], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'EJ Tobacco Delivery'
        }).addTo(map);

        let markerKurir = null;
        let posisiTerakhir = null;
        let isPertamaKali = true;

        // Custom Icon Motor
        const iconMotor = L.divIcon({
            className: 'custom-div-icon',
            html: "<div class='kurir-marker'><i class='fa-solid fa-motorcycle'></i></div>",
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        // 4. Tarik Data GPS dari Firebase
        if (kurirAktif) {
            db.ref('tracking/' + kurirAktif.toLowerCase()).on('value', (snap) => {
                const data = snap.val();
                
                if (data && data.lat && data.lng) {
                    posisiTerakhir = [data.lat, data.lng];

                    // Ubah UI menjadi Online
                    const statusEl = document.getElementById('statusKurir');
                    statusEl.className = "status-badge status-online";
                    statusEl.innerHTML = '<i class="fa-solid fa-satellite-dish fa-beat"></i> LIVE';
                    document.getElementById('waktuUpdate').innerText = data.waktu || new Date().toLocaleTimeString('id-ID');

                    // Buat atau pindahkan marker
                    if (!markerKurir) {
                        markerKurir = L.marker(posisiTerakhir, {icon: iconMotor}).addTo(map);
                    } else {
                        markerKurir.setLatLng(posisiTerakhir); // Animasi otomatis bergerak
                    }

                    // Fokuskan kamera saat pertama kali load data
                    if (isPertamaKali) {
                        map.setView(posisiTerakhir, 16);
                        isPertamaKali = false;
                    }
                } else {
                    // Jika kurir belum menyalakan GPS hari ini
                    const statusEl = document.getElementById('statusKurir');
                    statusEl.className = "status-badge status-offline";
                    statusEl.innerHTML = '<i class="fa-solid fa-power-off"></i> OFFLINE';
                    document.getElementById('waktuUpdate').innerText = "Belum aktif";
                }
            });
        } else {
            alert("Link tidak valid! Nama kurir tidak ditemukan.");
            document.getElementById('statusKurir').innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> ERROR';
        }

        // Tombol Re-center Peta
        function fokusKeKurir() {
            if (posisiTerakhir && map) {
                map.flyTo(posisiTerakhir, 16, { animate: true, duration: 1 });
            } else {
                alert("Posisi kurir belum ditemukan. Harap tunggu.");
            }
        }
    </script>
</body>
</html>
